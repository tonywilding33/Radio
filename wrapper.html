<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Producer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #f4f4f4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding-top: 40px;
            overflow: hidden; 
        }

        .header-text {
            text-align: center;
            max-width: 450px;
            margin-bottom: 25px;
        }

        h1 {
            color: #e31e24;
            font-size: 1.6rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #666;
            font-size: 1rem;
            font-weight: 400;
        }

        .iframe-container {
            width: 95%;
            max-width: 600px;
            height: 85vh;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #ddd;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header-text">
        <h1>Welcome</h1>
        <p>A smart scheduler that automatically builds perfectly balanced broadcast logs for our patients.</p>
    </div>

    <div class="iframe-container">
        <iframe src="Global.html" title="Producer Interface"></iframe>
    </div>

    <script>
        document.onkeydown = function(e) {
            if (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 73 || (e.shiftKey && e.keyCode === 73))) {
                return false;
            }
            if (e.keyCode === 123) {
                return false;
            }
        };
    </script>
</body>
</html>
