<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHR | Virtual Producer v2.14</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --rhr-red: #e31e24; 
            --rhr-pink-fill: #fde2e2;
            --rhr-pink-line: #f1a9a9;
            --rhr-dark: #2c3e50;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f4f4; padding: 10px; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 500px; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        
        .logo-container { text-align: center; margin-bottom: 10px; }
        .rhr-logo-svg { width: 120px; height: auto; display: block; margin: 0 auto; }
        .station-name { color: var(--rhr-red); font-size: 1.2rem; font-weight: 900; text-transform: uppercase; text-align: center; margin-top: -5px; margin-bottom: 20px;}

        label { display: block; font-weight: bold; margin: 10px 0 5px; font-size: 0.85rem; color: #444; }
        select { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; background: #fff; appearance: none; }
        
        .btn { width: 100%; border: none; padding: 16px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-bottom: 10px; transition: opacity 0.2s; }
        .btn-main { background: var(--rhr-red); color: #fff; }
        .btn-main:active { opacity: 0.8; }
        
        #playlist-box { border: 1px solid #eee; border-radius: 8px; max-height: 550px; overflow-y: auto; margin: 15px 0; padding: 0; background: #fff; }
        
        .hour-marker { 
            background: var(--rhr-dark); 
            color: #fff; 
            padding: 8px 15px; 
            font-size: 0.9rem; 
            font-weight: bold; 
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .hour-marker::after { content: attr(data-part); font-size: 0.6rem; opacity: 0.7; }

        .track-row { display: flex; padding: 12px 15px; border-bottom: 1px solid #eee; align-items: center; font-size: 0.85rem; background: #fff; }
        .track-row:nth-of-type(even) { background-color: var(--rhr-pink-fill); }
        
        .track-info { flex-grow: 1; padding-right: 10px; }
        .t-artist { font-weight: bold; color: #222; text-transform: uppercase; }
        .t-title { color: #555; font-size: 0.8rem; margin-top: 2px; }
        .t-loc-raw { font-weight: bold; color: var(--rhr-red); margin-left: 8px; font-family: monospace; }
        
        .time-col { font-weight: bold; color: var(--rhr-dark); font-family: "Courier New", Courier, monospace; min-width: 45px; text-align: right; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-group .btn { flex: 1; }
        
        .dev-footer { text-align: center; font-size: 0.65rem; color: #999; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <div class="logo-container">
            <svg class="rhr-logo-svg" viewBox="0 0 160 140" xmlns="http://www.w3.org/2000/svg">
                <path d="M80 120C80 120 20 85 20 45C20 25 35 15 50 15C60 15 72 22 80 35C88 22 100 15 110 15C125 15 140 25 140 45C140 85 80 120 80 120Z" fill="var(--rhr-pink-fill)" />
                <path d="M80 125C80 125 15 88 15 45C15 22 32 10 50 10C62 10 74 18 80 30C86 18 98 10 110 10C128 10 145 22 145 45C145 88 80 125 80 125Z" fill="none" stroke="var(--rhr-pink-line)" stroke-width="2" />
                <path d="M80 115C80 115 25 82 25 45C25 28 38 20 50 20C60 20 72 25 80 35C88 25 100 20 110 20C122 20 135 28 135 45C135 82 80 115 80 115Z" fill="none" stroke="var(--rhr-pink-line)" stroke-width="1.5" />
                <text x="50%" y="65%" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="48" fill="var(--rhr-red)" font-weight="900">RHR</text>
            </svg>
        </div>
        <div class="station-name">Rugby Hospital Radio</div>

        <div id="setup-view">
            <label>Start Hour</label>
            <select id="start-hour"></select>
            <label>Duration</label>
            <select id="shift-duration"></select>
            <button class="btn btn-main" onclick="connectAndBuild()">GENERATE BROADCAST LOG</button>
        </div>

        <div id="monitor" style="display:none;">
            <div id="playlist-box"></div>
            <div class="btn-group">
                <button class="btn btn-main" onclick="copyToClipboard()">📋 COPY LOG</button>
                <button class="btn btn-main" style="background:#2ecc71" onclick="downloadLog()">💾 DOWNLOAD .TXT</button>
            </div>
            <button class="btn btn-main" style="background:#555" onclick="location.reload()">↺ RESET</button>
        </div>

        <div class="dev-footer">Developed by Tony Wilding</div>
    </div>
</div>

<script>
    const _MASTER_REF = 'https://raw.githubusercontent.com/tonywilding33/Radio/main/rhr_master.csv';
    let masterLibrary = [];
    let hourlyPlaylist = {}; 
    
    const WEIGHTS = { 
        WAKEUP:   { 5: 15, 4: 25, 3: 40, 2: 15, 1: 5  }, 
        COREDAY:  { 5: 30, 4: 30, 3: 22, 2: 12, 1: 6  }, 
        WINDDOWN: { 5: 5,  4: 15, 3: 45, 2: 25, 1: 10 }, 
        SLEEP:    { 5: 2,  4: 8,  3: 15, 2: 35, 1: 40 }  
    };

    window.onload = function() {
        const hBox = document.getElementById('start-hour');
        for(let i=0; i<24; i++) hBox.add(new Option(i.toString().padStart(2, '0') + ":00", i));
        const dBox = document.getElementById('shift-duration');
        for(let i=1; i<=24; i++) dBox.add(new Option(i + (i === 1 ? " Hour" : " Hours"), i));
    };

    function cleanArtist(name) {
        let n = String(name || '').trim();
        if (n.toLowerCase().startsWith("the ")) n = n.slice(4);
        return n.trim();
    }

    async function connectAndBuild() {
        try {
            const resp = await fetch(_MASTER_REF);
            const csv = await resp.text();
            const isDecember = new Date().getMonth() === 11;

            Papa.parse(csv, {
                header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: function(results) {
                    masterLibrary = results.data.filter(r => {
                        const isEnabled = String(r.Enabled || '').trim().toUpperCase() === 'Y';
                        const loc1 = String(r['Location 1'] || '').trim();
                        const loc2 = String(r['Location 2'] || '').trim().toLowerCase() === 'y';
                        const title = String(r.Title || '').toLowerCase();
                        const isXmas = title.includes('christmas') || title.includes('xmas');
                        if (!isDecember && isXmas) return false;
                        return r.Artist && r.Title && isEnabled && (loc1 !== '' || loc2);
                    });
                    runLogic();
                }
            });
        } catch (err) { alert("Connection Error."); }
    }

    function getTimeframeInfo(hour) {
        if (hour >= 7 && hour < 10) return { key: 'WAKEUP', label: 'WAKE-UP' };
        if (hour >= 10 && hour < 17) return { key: 'COREDAY', label: 'CORE DAY' };
        if (hour >= 17 && hour < 22) return { key: 'WINDDOWN', label: 'WIND-DOWN' };
        return { key: 'SLEEP', label: 'SLEEP/OVERNIGHT' };
    }

    function runLogic() {
        const startHour = parseInt(document.getElementById('start-hour').value);
        const duration = parseInt(document.getElementById('shift-duration').value);
        const isDecember = new Date().getMonth() === 11;
        hourlyPlaylist = {};
        let history = []; 

        for (let h = 0; h < duration; h++) {
            let currentHour = (startHour + h) % 24;
            let hourTracks = [];
            let elapsedInHour = 0;
            const currentTF = getTimeframeInfo(currentHour);
            const prevTF = getTimeframeInfo((currentHour - 1 + 24) % 24);

            while (elapsedInHour < 3600) {
                let activeWeights;
                if (elapsedInHour < 900 && currentTF.key !== prevTF.key) {
                    activeWeights = {};
                    for (let i = 1; i <= 5; i++) {
                        activeWeights[i] = (WEIGHTS[currentTF.key][i] + WEIGHTS[prevTF.key][i]) / 2;
                    }
                } else {
                    activeWeights = WEIGHTS[currentTF.key];
                }

                let forceXmas = isDecember && (Math.random() < 0.33);
                let roll = Math.random() * 100;
                let targetEnergy = 3;
                let cumulative = 0;
                for (let [level, weight] of Object.entries(activeWeights)) {
                    cumulative += weight;
                    if (roll <= cumulative) { targetEnergy = parseInt(level); break; }
                }

                const checkRules = (song, currentTimeInMinutes) => {
                    const songMatch = history.findLast(hi => hi.title === song.Title && hi.artist === song.Artist);
                    const artistMatch = history.findLast(hi => hi.artist === song.Artist);
                    const title = String(song.Title).toLowerCase();
                    const isXmas = title.includes('christmas') || title.includes('xmas');
                    
                    if (forceXmas && !isXmas) return false;
                    
                    // ROTATION BUFFER: Song cannot play within 2 hours before or after its play-time today
                    // Enforced via a 22-hour minimum and 26-hour maximum block on the same track
                    if (songMatch) {
                        const timeDiff = Date.now() - songMatch.timestamp;
                        // Block if less than 22 hours (prevents "too soon" overall)
                        if (timeDiff < 79200000) return false;
                        // Block if between 22 and 26 hours (the +/- 2 hour same-time window tomorrow)
                        if (timeDiff >= 79200000 && timeDiff <= 93600000) return false;
                    }
                    
                    // ARTIST SEPARATION: 2 hours 15 mins (8,100,000 ms)
                    if (artistMatch && (Date.now() - artistMatch.timestamp < 8100000)) return false;

                    return true;
                };

                let currentTimeInMinutes = (currentHour * 60) + (elapsedInHour / 60);
                let picks = masterLibrary.filter(s => parseInt(s.Energy) === targetEnergy && checkRules(s, currentTimeInMinutes));
                
                if (picks.length === 0) picks = masterLibrary.filter(s => checkRules(s, currentTimeInMinutes));
                if (picks.length === 0 && forceXmas) {
                    picks = masterLibrary.filter(s => !String(s.Title).toLowerCase().includes('christmas') && !String(s.Title).toLowerCase().includes('xmas'));
                }
                
                if (picks.length > 0) {
                    let p = {...picks[Math.floor(Math.random() * picks.length)]};
                    p.timeStr = currentHour.toString().padStart(2,'0') + ":" + Math.floor(elapsedInHour / 60).toString().padStart(2,'0');
                    p.displayArtist = cleanArtist(p.Artist);
                    p.dayPart = currentTF.label;
                    let mediaID = String(p['Location 1'] || '').trim();
                    let isOnPC = String(p['Location 2'] || '').trim().toLowerCase() === 'y';
                    p.locCombined = mediaID + (isOnPC ? (mediaID ? " PC" : "PC") : "");
                    hourTracks.push(p);
                    history.push({artist: p.Artist, title: p.Title, timestamp: Date.now()});
                    elapsedInHour += 240; 
                } else break;
            }
            hourlyPlaylist[currentHour] = hourTracks;
        }
        render();
    }

    function render() {
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('monitor').style.display = 'block';
        let html = "";
        const hours = Object.keys(hourlyPlaylist);
        hours.forEach(hour => {
            const firstTrack = hourlyPlaylist[hour][0];
            const part = firstTrack ? firstTrack.dayPart : "CLOCK";
            html += `<div class="hour-marker" data-part="${part}">${hour.padStart(2,'0')}:00</div>`;
            html += hourlyPlaylist[hour].map(t => `
                <div class="track-row">
                    <div class="track-info">
                        <div class="t-artist">${t.displayArtist}</div>
                        <div class="t-title">${t.Title} <span class="t-loc-raw">${t.locCombined}</span></div>
                    </div>
                    <div class="time-col">${t.timeStr}</div>
                </div>
            `).join('');
        });
        document.getElementById('playlist-box').innerHTML = html;
    }

    function generateLogText() {
        let txt = "RHR BROADCAST LOG\nGenerated by RHR Virtual Producer v2.14\n" + "=".repeat(40) + "\n";
        const hours = Object.keys(hourlyPlaylist);
        hours.forEach(hour => {
            const part = hourlyPlaylist[hour][0]?.dayPart || "CLOCK";
            txt += `\n[ ${hour.padStart(2,'0')}:00 | ${part} ]\n`;
            txt += "-".repeat(40) + "\n";
            txt += hourlyPlaylist[hour].map(t => `${t.timeStr} | ${t.displayArtist.padEnd(20)} | ${t.Title.padEnd(25)} | ${t.locCombined}`).join('\n') + "\n";
            txt += "-".repeat(40) + "\n";
        });
        txt += "\n" + "=".repeat(40) + "\nScheduler developed by Tony Wilding";
        return txt;
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(generateLogText()).then(() => alert("Broadcast Log Copied to Clipboard!"));
    }

    function downloadLog() {
        const blob = new Blob([generateLogText()], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `RHR_Log_${new Date().toISOString().slice(0,10)}.txt`;
        a.click();
        window.URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
