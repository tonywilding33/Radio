<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHR | Virtual Producer v1.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --rhr-red: #e31e24; 
            --rhr-pink-fill: #fde2e2;
            --rhr-pink-line: #f1a9a9;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f4f4; padding: 10px; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 500px; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        
        .logo-container { text-align: center; margin-bottom: 10px; }
        .rhr-logo-svg { width: 120px; height: auto; display: block; margin: 0 auto; }
        .station-name { color: var(--rhr-red); font-size: 1.2rem; font-weight: 900; text-transform: uppercase; text-align: center; margin-top: -5px; margin-bottom: 20px;}

        label { display: block; font-weight: bold; margin: 10px 0 5px; font-size: 0.85rem; color: #444; }
        select { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; background: #fff; appearance: none; }
        
        .btn { width: 100%; border: none; padding: 16px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-bottom: 10px; transition: opacity 0.2s; }
        .btn-main { background: var(--rhr-red); color: #fff; }
        .btn-main:active { opacity: 0.8; }
        
        #playlist-box { border: 1px solid #eee; border-radius: 8px; max-height: 500px; overflow-y: auto; margin: 15px 0; padding: 5px; }
        .track-row { display: flex; padding: 10px; border-bottom: 1px solid #f9f9f9; align-items: center; background-color: #fff; font-size: 0.85rem; }
        .track-row:nth-child(even) { background-color: var(--rhr-pink-fill); }
        
        .track-info { flex-grow: 1; padding-right: 10px; }
        .t-artist { font-weight: bold; color: #222; }
        .t-title { color: #555; font-size: 0.8rem; }
        .t-loc-raw { font-weight: bold; color: var(--rhr-red); margin-left: 5px; }
        
        .time-col { font-weight: bold; color: #444; font-family: "Courier New", Courier, monospace; min-width: 45px; text-align: right; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-group .btn { flex: 1; }
        
        .dev-footer { text-align: center; font-size: 0.65rem; color: #999; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <div class="logo-container">
            <svg class="rhr-logo-svg" viewBox="0 0 160 140" xmlns="http://www.w3.org/2000/svg">
                <path d="M80 120C80 120 20 85 20 45C20 25 35 15 50 15C60 15 72 22 80 35C88 22 100 15 110 15C125 15 140 25 140 45C140 85 80 120 80 120Z" fill="var(--rhr-pink-fill)" />
                <path d="M80 125C80 125 15 88 15 45C15 22 32 10 50 10C62 10 74 18 80 30C86 18 98 10 110 10C128 10 145 22 145 45C145 88 80 125 80 125Z" fill="none" stroke="var(--rhr-pink-line)" stroke-width="2" />
                <path d="M80 115C80 115 25 82 25 45C25 28 38 20 50 20C60 20 72 25 80 35C88 25 100 20 110 20C122 20 135 28 135 45C135 82 80 115 80 115Z" fill="none" stroke="var(--rhr-pink-line)" stroke-width="1.5" />
                <text x="50%" y="65%" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="48" fill="var(--rhr-red)" font-weight="900">RHR</text>
            </svg>
        </div>
        <div class="station-name">Rugby Hospital Radio</div>

        <div id="setup-view">
            <label>Start Hour</label>
            <select id="start-hour"></select>
            <label>Duration</label>
            <select id="shift-duration"></select>
            <button class="btn btn-main" onclick="connectAndBuild()">GENERATE BROADCAST LOG</button>
        </div>

        <div id="monitor" style="display:none;">
            <div id="playlist-box"></div>
            <div class="btn-group">
                <button class="btn btn-main" onclick="copyToClipboard()">📋 COPY LOG</button>
                <button class="btn btn-main" style="background:#2ecc71" onclick="downloadLog()">💾 DOWNLOAD .TXT</button>
            </div>
            <button class="btn btn-main" style="background:#555" onclick="location.reload()">↺ RESET</button>
        </div>

        <div class="dev-footer">Developed by Tony Wilding</div>
    </div>
</div>

<script>
    const _MASTER_REF = 'https://raw.githubusercontent.com/tonywilding33/Radio/main/rhr_master.csv';
    let masterLibrary = [];
    let hourlyPlaylist = {}; 
    const WEIGHTS = { DAY: { 5: 35, 4: 30, 3: 20, 2: 10, 1: 5 }, NIGHT: { 1: 35, 2: 30, 3: 20, 4: 10, 5: 5 } };

    window.onload = function() {
        const hBox = document.getElementById('start-hour');
        for(let i=0; i<24; i++) hBox.add(new Option(i.toString().padStart(2, '0') + ":00", i));
        const dBox = document.getElementById('shift-duration');
        for(let i=1; i<=24; i++) dBox.add(new Option(i + (i === 1 ? " Hour" : " Hours"), i));
    };

    function cleanArtist(name) {
        let n = String(name || '').trim();
        if (n.toLowerCase().startsWith("the ")) n = n.slice(4);
        return n.trim();
    }

    async function connectAndBuild() {
        try {
            const resp = await fetch(_MASTER_REF);
            const csv = await resp.text();
            Papa.parse(csv, {
                header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: function(results) {
                    masterLibrary = results.data.filter(r => {
                        const isEnabled = String(r.Enabled || '').trim().toUpperCase() === 'Y';
                        return r.Artist && r.Title && isEnabled && (r['Location 1'] || r['Location 2']);
                    });
                    runLogic();
                }
            });
        } catch (err) { alert("Connection Error."); }
    }

    function runLogic() {
        const startHour = parseInt(document.getElementById('start-hour').value);
        const duration = parseInt(document.getElementById('shift-duration').value);
        hourlyPlaylist = {};
        let history = []; 

        for (let h = 0; h < duration; h++) {
            let currentHour = (startHour + h) % 24;
            let hourTracks = [];
            let elapsedInHour = 0;
            const isDay = (currentHour >= 7 && currentHour < 23);
            const activeWeights = isDay ? WEIGHTS.DAY : WEIGHTS.NIGHT;

            while (elapsedInHour < 3600) {
                let roll = Math.random() * 100;
                let targetEnergy = 3;
                let cumulative = 0;
                for (let [level, weight] of Object.entries(activeWeights)) {
                    cumulative += weight;
                    if (roll <= cumulative) { targetEnergy = parseInt(level); break; }
                }
                const checkRules = (song) => {
                    const lastA = history.findLast(hi => hi.artist === song.Artist);
                    return !lastA || (Date.now() - lastA.timestamp > 7200000); 
                };
                let picks = masterLibrary.filter(s => parseInt(s.Energy) === targetEnergy && checkRules(s));
                if (picks.length === 0) picks = masterLibrary.filter(s => checkRules(s));
                if (picks.length > 0) {
                    let p = {...picks[Math.floor(Math.random() * picks.length)]};
                    p.timeStr = currentHour.toString().padStart(2,'0') + ":" + Math.floor(elapsedInHour / 60).toString().padStart(2,'0');
                    p.displayArtist = cleanArtist(p.Artist);
                    p.locNum = String(p['Location 1'] || '').trim();
                    hourTracks.push(p);
                    history.push({artist: p.Artist, timestamp: Date.now()});
                    elapsedInHour += 240; 
                } else break;
            }
            hourlyPlaylist[currentHour] = hourTracks;
        }
        render();
    }

    function render() {
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('monitor').style.display = 'block';
        let html = "";
        for (let hour in hourlyPlaylist) {
            html += hourlyPlaylist[hour].map(t => `
                <div class="track-row">
                    <div class="track-info">
                        <div class="t-artist">${t.displayArtist}</div>
                        <div class="t-title">${t.Title} <span class="t-loc-raw">${t.locNum}</span></div>
                    </div>
                    <div class="time-col">${t.timeStr}</div>
                </div>
            `).join('');
        }
        document.getElementById('playlist-box').innerHTML = html;
    }

    function generateLogText() {
        let txt = "RHR BROADCAST LOG\nGenerated by Tony Wilding\n\n";
        for (let hour in hourlyPlaylist) {
            txt += hourlyPlaylist[hour].map(t => `${t.timeStr} | ${t.displayArtist} - ${t.Title} | ${t.locNum}`).join('\n') + "\n";
        }
        return txt;
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(generateLogText()).then(() => alert("Log Copied!"));
    }

    function downloadLog() {
        const blob = new Blob([generateLogText()], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `RHR_Log_${new Date().toISOString().slice(0,10)}.txt`;
        a.click();
        window.URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
