<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony Wilding">
    <title>Hospital Radio | Playlist Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --success: #10b981; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .wrapper { width: 100%; max-width: 550px; padding: 20px; }
        .setup-card { background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.4); border: 1px solid #334155; }
        h1 { font-size: 1.6rem; margin: 0 0 25px 0; text-align: center; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
        .field { margin-bottom: 20px; }
        .grid-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; margin-bottom: 6px; }
        select { width: 100%; background: #0f172a; color: white; border: 1px solid #475569; padding: 12px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        .btn-start { width: 100%; background: var(--accent); color: #0f172a; border: none; padding: 16px; border-radius: 8px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        #monitor { display: none; background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #334155; }
        .status-header { font-weight: 800; color: var(--accent); font-size: 1.1rem; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .playlist-container { max-height: 500px; overflow-y: auto; margin-top: 15px; border-top: 1px solid #334155; border-bottom: 1px solid #334155; margin-bottom: 20px; padding: 5px; }
        .track-row { padding: 10px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 10px; }
        .num-col { color: var(--accent); font-weight: 800; font-size: 0.85rem; min-width: 30px; opacity: 0.7; }
        .track-info { flex-grow: 1; }
        .t-artist { color: var(--accent); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .t-title { font-size: 1rem; font-weight: 600; color: #fff; }
        .time-col { color: #94a3b8; font-family: monospace; font-size: 0.9rem; min-width: 55px; text-align: right; font-weight: 600; }
        .btn-download { width: 100%; background: var(--success); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-bottom: 10px; }
        .btn-back { width: 100%; background: transparent; color: #94a3b8; border: 1px solid #475569; padding: 10px; border-radius: 8px; font-weight: 600; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .credit-footer { text-align: center; color: #f8fafc; font-size: 0.65rem; margin-top: 25px; text-transform: uppercase; letter-spacing: 2px; border-top: 1px solid #334155; padding-top: 15px; font-weight: 700; opacity: 0.9; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="setup-view" class="setup-card">
        <h1>STATION SCHEDULER</h1>
        
        <div class="field">
            <label>Broadcast Day</label>
            <select id="broadcast-day">
                <option value="0">Monday</option>
                <option value="1">Tuesday</option>
                <option value="2">Wednesday</option>
                <option value="3">Thursday</option>
                <option value="4">Friday</option>
                <option value="5">Saturday</option>
                <option value="6">Sunday</option>
            </select>
        </div>

        <div class="grid-fields">
            <div class="field">
                <label>Start Hour</label>
                <select id="start-hour"></select>
            </div>
            <div class="field">
                <label>Duration</label>
                <select id="duration"></select>
            </div>
        </div>

        <button class="btn-start" onclick="connectAndBuild()">GENERATE PLAYLIST</button>
        <div class="credit-footer">Developed by Tony Wilding</div>
    </div>

    <div id="monitor">
        <div class="status-header">
            <span id="log-day-label">STATION LOG</span>
            <span id="track-count" style="font-size: 0.6rem; letter-spacing: 1px;"></span>
        </div>
        <div id="playlist-box" class="playlist-container"></div>
        <button class="btn-download" onclick="downloadTxt()">Download Playlist (txt)</button>
        <button class="btn-back" onclick="resetView()">← SCHEDULE MORE</button>
        <div class="credit-footer">Developed by Tony Wilding</div>
    </div>
</div>

<script>
    const CSV_URL = 'https://raw.githubusercontent.com/tonywilding33/Radio/main/HR3328152B.csv';
    const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
    let masterLibrary = [];
    let currentPlaylist = [];

    window.onload = function() {
        const hourBox = document.getElementById('start-hour');
        for(let i=0; i<24; i++) {
            hourBox.add(new Option(i.toString().padStart(2, '0') + ":00", i));
        }
        const durationBox = document.getElementById('duration');
        for(let i=1; i<=24; i++) {
            durationBox.add(new Option(i + (i === 1 ? " Hour" : " Hours"), i * 60));
        }
        // Auto-select current day
        let today = new Date().getDay(); // 0 is Sunday
        document.getElementById('broadcast-day').value = today === 0 ? 6 : today - 1;
    };

    function resetView() {
        document.getElementById('monitor').style.display = 'none';
        document.getElementById('setup-view').style.display = 'block';
    }

    async function connectAndBuild() {
        try {
            const resp = await fetch(CSV_URL);
            const csv = await resp.text();
            Papa.parse(csv, {
                header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: function(results) {
                    masterLibrary = results.data.filter(r => 
                        r.Artist && r.Title && String(r.Enabled).trim().toUpperCase() === 'Y'
                    );
                    runLogic();
                }
            });
        } catch (err) { alert("Sync Error."); }
    }

    function formatTime(totalSeconds, startHour) {
        let h = (startHour + Math.floor(totalSeconds / 3600)) % 24;
        let m = Math.floor((totalSeconds % 3600) / 60);
        return h.toString().padStart(2, '0') + ":" + m.toString().padStart(2, '0');
    }

    function runLogic() {
        const durationMins = parseInt(document.getElementById('duration').value);
        const startHour = parseInt(document.getElementById('start-hour').value);
        const dayIdx = parseInt(document.getElementById('broadcast-day').value);
        
        // Logical time: We treat the week as one continuous timeline of seconds
        // Monday 00:00 is 0. Sunday 23:59 is 604,800.
        const dayOffsetSec = dayIdx * 86400;
        const sessionStartTotalSec = dayOffsetSec + (startHour * 3600);

        let persistentHistory = JSON.parse(localStorage.getItem('radio_history_v2') || "{}");

        currentPlaylist = [];
        let sessionHistory = [];
        let genreHistory = [];
        let totalSec = 0;
        const trackAverageSec = 240; 
        const targetSec = durationMins * 60;

        while (totalSec + trackAverageSec <= targetSec) {
            let currentVirtualHour = (startHour + Math.floor(totalSec / 3600)) % 24;
            let dayPart = (currentVirtualHour >= 6 && currentVirtualHour < 12) ? "Morning" : 
                          (currentVirtualHour >= 12 && currentVirtualHour < 18) ? "Afternoon" : 
                          (currentVirtualHour >= 18 && currentVirtualHour < 22) ? "Evening" : "Night";

            const isOpener = currentPlaylist.length === 0;
            const isCloser = (totalSec + (trackAverageSec * 2)) >= targetSec;

            let basePool = masterLibrary.filter(s => {
                const genreClean = String(s.Genre).trim().toUpperCase();
                if (new Date().getMonth() !== 11 && genreClean.includes("CHRISTMAS")) return false;
                return (s.Daypart === dayPart);
            });

            // Separation Rules: Strict (4h 15m / 15300s)
            let rules = [
                { songSep: 15300, artistSep: 6300, relax: false },
                { songSep: 7200,  artistSep: 3600, relax: true } 
            ];

            let pool = [];
            for (let rule of rules) {
                pool = basePool.filter(s => {
                    // Check this specific show session
                    const lastS_Session = sessionHistory.findLast(h => h.id === s.ID);
                    const lastA_Session = sessionHistory.findLast(h => h.artist === s.Artist);
                    
                    // Check the global week history
                    const lastPlayedTotalSec = persistentHistory[s.ID] || -999999;
                    const diffFromGlobal = (sessionStartTotalSec + totalSec) - lastPlayedTotalSec;

                    const sepOk = (!lastS_Session || (totalSec - lastS_Session.time > rule.songSep)) && 
                                  (!lastA_Session || (totalSec - lastA_Session.time > rule.artistSep)) &&
                                  (Math.abs(diffFromGlobal) > rule.songSep);
                    
                    const genreOk = !rule.relax ? !genreHistory.includes(String(s.Genre).trim().toUpperCase()) : true;
                    
                    let energyOk = true;
                    if (!rule.relax) {
                        if (isOpener) energyOk = (s.Energy >= 4);
                        else if (isCloser) energyOk = (s.Energy === 5);
                        else if ((currentPlaylist.length + 1) % 3 === 0) energyOk = (s.Energy >= 4);
                    }

                    return sepOk && genreOk && energyOk;
                });
                if (pool.length > 0) break;
            }

            if (pool.length === 0) break; 
            
            let pick = {...pool[Math.floor(Math.random() * pool.length)]};
            pick.startTime = formatTime(totalSec, startHour);
            pick.globalSec = sessionStartTotalSec + totalSec;
            
            currentPlaylist.push(pick);
            sessionHistory.push({ id: pick.ID, artist: pick.Artist, time: totalSec });
            genreHistory.push(String(pick.Genre).trim().toUpperCase());
            if (genreHistory.length > 2) genreHistory.shift();
            
            totalSec += trackAverageSec; 
        }

        // Save to Persistent History
        currentPlaylist.forEach(track => {
            persistentHistory[track.ID] = track.globalSec;
        });
        localStorage.setItem('radio_history_v2', JSON.stringify(persistentHistory));

        document.getElementById('log-day-label').innerText = DAYS[dayIdx].toUpperCase() + " LOG";
        render();
    }

    function render() {
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('monitor').style.display = 'block';
        document.getElementById('track-count').innerText = `${currentPlaylist.length} TRACKS`;
        const box = document.getElementById('playlist-box');
        box.innerHTML = currentPlaylist.map((t, i) => `
            <div class="track-row">
                <div class="num-col">${(i + 1).toString().padStart(2, '0')}</div>
                <div class="track-info">
                    <div class="t-artist">${t.Artist}</div>
                    <div class="t-title">${t.Title}</div>
                </div>
                <div class="time-col">${t.startTime}</div>
            </div>
        `).join('');
    }

    function downloadTxt() {
        const dayIdx = document.getElementById('broadcast-day').value;
        let content = `SHOW LOG | ${DAYS[dayIdx].toUpperCase()}\n` + "=".repeat(40) + "\n";
        content += currentPlaylist.map((t, i) => `${(i + 1).toString().padStart(2, '0')} | ${t.startTime} | ${t.Artist} - ${t.Title}`).join('\n');
        content += "\n" + "=".repeat(40) + "\nDeveloped by Tony Wilding";
        
        const blob = new Blob([content], { type: 'text/plain' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `HR_Log_${DAYS[dayIdx]}.txt`;
        a.click();
    }
</script>
</body>
</html>
