<script>
    const CSV_URL = 'https://raw.githubusercontent.com/tonywilding33/Radio/main/HR3328152B.csv';
    let masterLibrary = [];
    let currentPlaylist = [];

    window.onload = function() {
        const hourBox = document.getElementById('start-hour');
        for(let i=0; i<24; i++) {
            let opt = new Option(i.toString().padStart(2, '0') + ":00", i);
            hourBox.add(opt);
        }
        const durationBox = document.getElementById('duration');
        // Standard session hours
        for(let i=1; i<=24; i++) {
            durationBox.add(new Option(i + (i === 1 ? " Hour Session" : " Hour Sessions"), i * 60));
        }
        // New Multi-day options (up to 7 days)
        for(let d=2; d<=7; d++) {
            durationBox.add(new Option(d + " Full Days", d * 1440));
        }
    };

    function resetView() {
        document.getElementById('monitor').style.display = 'none';
        document.getElementById('setup-view').style.display = 'block';
    }

    async function connectAndBuild() {
        try {
            const resp = await fetch(CSV_URL);
            const csv = await resp.text();
            Papa.parse(csv, {
                header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: function(results) {
                    masterLibrary = results.data.filter(r => 
                        r.Artist && r.Title && String(r.Enabled).trim().toUpperCase() === 'Y'
                    );
                    runLogic();
                }
            });
        } catch (err) { alert("Sync Error."); }
    }

    function formatTime(totalSeconds, startHour) {
        let date = new Date();
        date.setHours(startHour, 0, 0, 0);
        date.setSeconds(totalSeconds);
        const day = Math.floor(totalSeconds / 86400) + 1;
        const clock = date.getHours().toString().padStart(2, '0') + ":" + date.getMinutes().toString().padStart(2, '0');
        return day > 1 ? `Day ${day} ${clock}` : clock;
    }

    function runLogic() {
        const durationMins = parseInt(document.getElementById('duration').value);
        const startHour = parseInt(document.getElementById('start-hour').value);
        const now = new Date();
        const isDecember = now.getMonth() === 11;

        currentPlaylist = [];
        let history = [];
        let genreHistory = [];
        let totalSec = 0;
        const trackAverageSec = 240; 
        const targetSec = durationMins * 60;
        let currentVirtualHour = startHour;

        while (totalSec + trackAverageSec <= targetSec) {
            let dayPart = (currentVirtualHour >= 6 && currentVirtualHour < 12) ? "Morning" : 
                          (currentVirtualHour >= 12 && currentVirtualHour < 18) ? "Afternoon" : 
                          (currentVirtualHour >= 18 && currentVirtualHour < 22) ? "Evening" : "Night";

            const isOpener = currentPlaylist.length === 0;
            const isCloser = (totalSec + (trackAverageSec * 2)) >= targetSec;

            let pool = masterLibrary.filter(s => {
                const genreClean = String(s.Genre).trim().toUpperCase();
                if (!isDecember && genreClean.includes("CHRISTMAS")) return false;

                const lastS = history.findLast(h => h.id === s.ID);
                const lastA = history.findLast(h => h.artist === s.Artist);
                
                // MAINTAINED SEPARATIONS: 15300s (Song) | 6300s (Artist)
                const separated = (!lastS || (totalSec - lastS.time > 15300)) && 
                                  (!lastA || (totalSec - lastA.time > 6300));
                
                // NEW CROSS-DAY PROTECTION: No repeats within 75 mins (4500s) of the same time on other days
                const crossDayConflict = history.filter(h => h.id === s.ID).some(h => {
                    const timeInDay = h.time % 86400; 
                    const currentTimeInDay = totalSec % 86400;
                    return Math.abs(timeInDay - currentTimeInDay) < 4500;
                });
                
                const genreOk = !genreHistory.includes(genreClean);
                
                let energyOk = true;
                if (isOpener) energyOk = (s.Energy >= 4);
                else if (isCloser) energyOk = (s.Energy === 5);
                else if ((currentPlaylist.length + 1) % 3 === 0) energyOk = (s.Energy >= 4);

                return (s.Daypart === dayPart) && separated && !crossDayConflict && genreOk && energyOk;
            });

            if (pool.length === 0) {
                console.warn("Buffer requirements could not be met. Stopping generation.");
                break; 
            }
            
            let pick = {...pool[Math.floor(Math.random() * pool.length)]};
            pick.startTime = formatTime(totalSec, startHour);
            currentPlaylist.push(pick);
            history.push({ id: pick.ID, artist: pick.Artist, time: totalSec });
            genreHistory.push(String(pick.Genre).trim().toUpperCase());
            if (genreHistory.length > 2) genreHistory.shift();
            
            totalSec += trackAverageSec; 
            currentVirtualHour = (startHour + Math.floor(totalSec / 3600)) % 24;
        }
        render();
    }

    function render() {
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('monitor').style.display = 'block';
        document.getElementById('track-count').innerText = `${currentPlaylist.length} TRACKS`;
        const box = document.getElementById('playlist-box');
        box.innerHTML = currentPlaylist.map((t, i) => `
            <div class="track-row">
                <div class="num-col">${(i + 1).toString().padStart(2, '0')}</div>
                <div class="track-info">
                    <div class="t-artist">${t.Artist}</div>
                    <div class="t-title">${t.Title}</div>
                </div>
                <div class="time-col">${t.startTime}</div>
            </div>
        `).join('');
    }

    function downloadTxt() {
        const now = new Date();
        let content = `STATION LOG | ${now.toLocaleDateString()} ${now.toLocaleTimeString()}\n`;
        content += "=".repeat(45) + "\n";
        content += currentPlaylist.map((t, i) => `${(i + 1).toString().padStart(3, '0')} | ${t.startTime.padEnd(12)} | ${t.Artist} - ${t.Title}`).join('\n');
        content += "\n" + "=".repeat(45) + "\nDeveloped by Tony Wilding";
        
        const blob = new Blob([content], { type: 'text/plain' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `HR_Full_Schedule_${now.toISOString().slice(0,10)}.txt`;
        a.click();
    }
</script>
