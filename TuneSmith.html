<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony Wilding">
    <title>Hospital Radio | Pro Playlist Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --success: #10b981; --gold: #fbbf24; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .wrapper { width: 100%; max-width: 550px; padding: 20px; }
        .setup-card { background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.4); border: 1px solid #334155; }
        h1 { font-size: 1.4rem; margin: 0 0 5px 0; text-align: center; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }
        .sub-h { font-size: 0.7rem; text-align: center; color: #94a3b8; margin-bottom: 25px; font-weight: 800; letter-spacing: 2px; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; margin-bottom: 6px; }
        select { width: 100%; background: #0f172a; color: white; border: 1px solid #475569; padding: 12px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        
        /* Golden Hour Toggle Style */
        .toggle-box { display: flex; align-items: center; justify-content: space-between; background: rgba(251, 191, 36, 0.1); padding: 15px; border-radius: 8px; border: 1px solid rgba(251, 191, 36, 0.3); margin-bottom: 20px; }
        .toggle-label { color: var(--gold); font-weight: 800; font-size: 0.8rem; text-transform: uppercase; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--gold); }
        input:checked + .slider:before { transform: translateX(26px); }

        .btn-start { width: 100%; background: var(--accent); color: #0f172a; border: none; padding: 16px; border-radius: 8px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        #monitor { display: none; background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #334155; }
        .status-header { font-weight: 800; color: var(--accent); font-size: 1.1rem; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .playlist-container { max-height: 500px; overflow-y: auto; margin-top: 15px; border-top: 1px solid #334155; border-bottom: 1px solid #334155; margin-bottom: 20px; padding: 5px; }
        .track-row { padding: 10px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 10px; }
        .num-col { color: var(--accent); font-weight: 800; font-size: 0.85rem; min-width: 30px; opacity: 0.7; }
        .track-info { flex-grow: 1; }
        .t-artist { color: var(--accent); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .t-title { font-size: 1rem; font-weight: 600; color: #fff; }
        .time-col { color: #94a3b8; font-family: monospace; font-size: 0.9rem; min-width: 55px; text-align: right; font-weight: 600; }
        .btn-download { width: 100%; background: var(--success); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="setup-view" class="setup-card">
        <h1>SHOW TIME</h1>
        <div class="sub-h">PRO BROADCAST SCHEDULER</div>
        
        <div class="toggle-box">
            <span class="toggle-label">Golden Hour (1970s Only)</span>
            <label class="switch">
                <input type="checkbox" id="golden-hour-toggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="field">
            <label>Start Hour</label>
            <select id="start-hour"></select>
        </div>
        <div class="field">
            <label>Session Duration</label>
            <select id="duration">
                <option value="60">1 Hour Session</option>
                <option value="120">2 Hour Session</option>
                <option value="180">3 Hour Session</option>
                <option value="240">4 Hour Session</option>
            </select>
        </div>
        <button class="btn-start" onclick="connectAndBuild()">GENERATE PLAYLIST</button>
    </div>

    <div id="monitor">
        <div class="status-header">
            <span>STATION LOG</span>
            <span id="track-count" style="font-size: 0.6rem; letter-spacing: 1px;"></span>
        </div>
        <div id="playlist-box" class="playlist-container"></div>
        <button class="btn-download" onclick="downloadTxt()">Download Playlist (txt)</button>
    </div>
</div>

<script>
    const CSV_URL = 'https://raw.githubusercontent.com/tonywilding33/Radio/main/HR3328152B.csv';
    let masterLibrary = [];
    let currentPlaylist = [];

    window.onload = function() {
        const hourBox = document.getElementById('start-hour');
        for(let i=0; i<24; i++) {
            let hLabel = i.toString().padStart(2, '0') + ":00";
            let opt = document.createElement("option");
            opt.value = i;
            opt.text = hLabel;
            if(i === 0) opt.selected = true;
            hourBox.add(opt);
        }
    };

    async function connectAndBuild() {
        try {
            const resp = await fetch(CSV_URL);
            const csv = await resp.text();
            Papa.parse(csv, {
                header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: function(results) {
                    masterLibrary = results.data.filter(r => 
                        r.Artist && r.Title && String(r.Enabled).trim().toUpperCase() === 'Y'
                    );
                    runLogic();
                }
            });
        } catch (err) { alert("Sync Error. Check GitHub."); }
    }

    function formatTime(totalSeconds, startHour) {
        let date = new Date();
        date.setHours(startHour, 0, 0, 0);
        date.setSeconds(totalSeconds);
        let h = date.getHours().toString().padStart(2, '0');
        let m = date.getMinutes().toString().padStart(2, '0');
        return `${h}:${m}`;
    }

    function runLogic() {
        const durationMins = parseInt(document.getElementById('duration').value);
        const startHour = parseInt(document.getElementById('start-hour').value);
        const isGoldenHour = document.getElementById('golden-hour-toggle').checked;
        
        currentPlaylist = [];
        let history = [];
        let genreHistory = [];
        let totalSec = 0;
        const targetSec = durationMins * 60;
        let currentVirtualHour = startHour;

        while (totalSec < targetSec) {
            let dayPart = (currentVirtualHour >= 6 && currentVirtualHour < 12) ? "Morning" : 
                          (currentVirtualHour >= 12 && currentVirtualHour < 18) ? "Afternoon" : 
                          (currentVirtualHour >= 18 && currentVirtualHour < 22) ? "Evening" : "Night";

            const isOpener = currentPlaylist.length === 0;

            let pool = masterLibrary.filter(s => {
                // RULE 1: If Golden Hour is ON, ONLY allow 1970s.
                if (isGoldenHour && s.Decade !== 1970) return false;

                const matchesTime = s.Daypart === dayPart;
                const lastS = history.findLast(h => h.id === s.ID);
                const lastA = history.findLast(h => h.artist === s.Artist);
                
                const separated = (!lastS || (totalSec - lastS.time > 14400)) && (!lastA || (totalSec - lastA.time > 5400));
                const genreClean = String(s.Genre).trim().toUpperCase();
                const genreOk = !genreHistory.includes(genreClean);
                const needsEnergy = (currentPlaylist.length + 1) % 3 === 0;
                const energyOk = needsEnergy ? (s.Energy >= 4) : true;

                // If Golden Hour is on, we ignore Daypart to ensure a full list, but keep separation
                if (isGoldenHour) return separated && genreOk;
                
                return isOpener ? (matchesTime && s.Energy >= 4) : (matchesTime && separated && genreOk && energyOk);
            });

            if (pool.length === 0) {
                // Emergency Fallback
                pool = masterLibrary.filter(s => {
                    if (isGoldenHour && s.Decade !== 1970) return false;
                    const lastA = history.findLast(h => h.artist === s.Artist);
                    return !lastA || (totalSec - lastA.time > 3600);
                });
            }
            
            if (pool.length === 0) break; 
            
            let pick = {...pool[Math.floor(Math.random() * pool.length)]};
            pick.startTime = formatTime(totalSec, startHour);
            
            currentPlaylist.push(pick);
            history.push({ id: pick.ID, artist: pick.Artist, time: totalSec });
            genreHistory.push(String(pick.Genre).trim().toUpperCase());
            if (genreHistory.length > 2) genreHistory.shift();
            
            totalSec += 210; 
            currentVirtualHour = (startHour + Math.floor(totalSec / 3600)) % 24;
        }
        render();
    }

    function render() {
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('monitor').style.display = 'block';
        document.getElementById('track-count').innerText = `${currentPlaylist.length} TRACKS`;
        const box = document.getElementById('playlist-box');
        box.innerHTML = currentPlaylist.map((t, i) => `
            <div class="track-row">
                <div class="num-col">${(i + 1).toString().padStart(2, '0')}</div>
                <div class="track-info">
                    <div class="t-artist">${t.Artist}</div>
                    <div class="t-title">${t.Title}</div>
                </div>
                <div class="time-col">${t.startTime}</div>
            </div>
        `).join('');
    }

    function downloadTxt() {
        const isGolden = document.getElementById('golden-hour-toggle').checked;
        let content = isGolden ? "HOSPITAL RADIO | GOLDEN HOUR LOG\n" : "HOSPITAL RADIO LOG\n";
        content += "=".repeat(25) + "\n";
        content += currentPlaylist.map((t, i) => `${(i + 1).toString().padStart(2, '0')} | ${t.startTime} | ${t.Artist} - ${t.Title}`).join('\n');
        const blob = new Blob([content], { type: 'text/plain' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = isGolden ? `HR_Golden_Hour_${new Date().toISOString().slice(0,10)}.txt` : `HR_Log_${new Date().toISOString().slice(0,10)}.txt`;
        a.click();
    }
</script>
</body>
</html>
