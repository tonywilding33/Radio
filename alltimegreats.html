<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony Wilding">
    <title>ALL TIME GREATS  | Playlist Generator</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --success: #10b981; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
            -webkit-user-select: none; user-select: none;
        }
        .box { width: 100%; max-width: 550px; background: var(--card); padding: 30px; border-radius: 16px; border: 1px solid #334155; }
        h2 { font-size: 1.6rem; margin-bottom: 25px; text-align: center; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-top: 0; }
        .status { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; margin-bottom: 10px; padding: 12px; background: #0f172a; border-radius: 8px; border: 1px solid #475569; text-align: center; }
        .debug-info { font-size: 0.6rem; color: #64748b; text-align: center; margin-bottom: 20px; text-transform: uppercase; }
        button { width: 100%; background: var(--accent); color: #0f172a; border: none; padding: 16px; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        pre { background: #0f172a; color: #fff; padding: 20px; border-radius: 8px; font-size: 0.9rem; white-space: pre-wrap; border-left: 4px solid var(--accent); line-height: 1.6; font-family: 'Segoe UI', monospace; overflow-x: auto; margin: 0; }
        .credit-footer { width: 100%; text-align: center; color: #f8fafc; font-size: 0.65rem; padding: 25px 0; text-transform: uppercase; opacity: 0.8; letter-spacing: 1px; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="box">
        <h2>ALL TIME GREATS </h2>
        <div id="loadStatus" class="status">INITIALIZING...</div>
        <div id="debugInfo" class="debug-info">MEMORY: 0 ITEMS LOCKED</div>
        <div id="outputArea" style="display:none;"><pre id="playlistDisplay"></pre></div>
        <div class="controls" id="bottomControls" style="display:none; margin-top: 20px;">
            <button style="background:var(--success); color:white;" onclick="downloadTxt()">Download Playlist (.txt)</button>
            <button onclick="generatePlaylist()">Generate New Show</button>
            <button style="background:#ef4444; color:white;" onclick="manualReset()">Force Reset All Memory</button>
        </div>
    </div>
    <div class="credit-footer">Developed by Tony Wilding</div>

    <script>
        const BASE_URL = 'https://raw.githubusercontent.com/tonywilding33/Radio/main/ATG3328152A.csv';
        let libraryData = [];
        const TWO_HOURS = 7200000;

        function getCleanKey(str) {
            if (!str) return "unknown";
            return str.toLowerCase().trim()
                .replace(/^the\s+/, "").replace(/\s+the$/, "")
                .replace(/[^a-z0-9]/g, "");
        }

        async function fetchLibrary() {
            const status = document.getElementById('loadStatus');
            const CACHE_BUSTER = `${BASE_URL}?t=${Date.now()}`;
            try {
                let response = await fetch(CACHE_BUSTER);
                if (response.ok) {
                    const text = await response.text();
                    processData(text);
                } else { throw new Error(); }
            } catch (e) { status.innerText = "CONNECTION FAILED."; }
        }

        function processData(csvText) {
            const lines = csvText.split(/\r?\n/);
            libraryData = lines.slice(1).map(line => {
                const cols = line.split(',');
                if (cols.length < 2) return null;
                return {
                    artist: cols[0], title: cols[1],    
                    score: parseFloat(cols[26]) || 0, 
                    gender: cols[27] || 'M',  
                    year: parseInt(cols[28]) || 1980,
                    artistKey: getCleanKey(cols[0]),
                    titleKey: getCleanKey(cols[1])
                };
            }).filter(r => r && r.artistKey !== "unknown");

            document.getElementById('loadStatus').innerText = `CONNECTED`;
            document.getElementById('loadStatus').style.background = "#10b981";
            generatePlaylist();
        }

        function updateDebug() {
            let count = 0;
            const now = Date.now();
            for (let i = 0; i < sessionStorage.length; i++) {
                const key = sessionStorage.key(i);
                if (key && key.startsWith('atg_')) {
                    const time = parseInt(sessionStorage.getItem(key));
                    if (now - time < TWO_HOURS) count++;
                }
            }
            document.getElementById('debugInfo').innerText = `MEMORY: ${count} ITEMS LOCKED`;
        }

        function generatePlaylist() {
            let playlist = [];
            let hourArtKeys = []; 
            let hourTitKeys = [];
            let genderHistory = [];
            let lastYear = 0;
            const now = Date.now();
            
            // Check if current month is December (Month 11 in JS)
            const isDecember = new Date().getMonth() === 11;

            const sorted = [...libraryData].sort((a, b) => b.score - a.score);

            for (let i = 0; i < 16; i++) {
                let pool = sorted.filter(r => {
                    // 1. Seasonal Lock: Block Christmas songs if not December
                    const isHolidayTrack = r.title.toLowerCase().includes("christmas") || r.title.toLowerCase().includes("xmas");
                    if (!isDecember && isHolidayTrack) return false;

                    // 2. Standard Logic
                    if (hourArtKeys.includes(r.artistKey)) return false;
                    if (hourTitKeys.includes(r.titleKey)) return false;

                    const lastArt = sessionStorage.getItem(`atg_art_${r.artistKey}`);
                    const lastTit = sessionStorage.getItem(`atg_tit_${r.titleKey}`);
                    if (lastArt && (now - parseInt(lastArt) < TWO_HOURS)) return false;
                    if (lastTit && (now - parseInt(lastTit) < TWO_HOURS)) return false;
                    
                    const genderClump = genderHistory.length >= 2 && genderHistory.every(g => g === r.gender);
                    const eraClump = lastYear !== 0 && Math.abs(r.year - lastYear) < 5;
                    return !genderClump && !eraClump;
                });

                if (pool.length === 0) {
                    sessionStorage.clear(); 
                    pool = sorted.filter(r => {
                        const isHolidayTrack = r.title.toLowerCase().includes("christmas") || r.title.toLowerCase().includes("xmas");
                        if (!isDecember && isHolidayTrack) return false;
                        return !hourArtKeys.includes(r.artistKey) && !hourTitKeys.includes(r.titleKey);
                    });
                }
                
                let pick = pool[Math.floor(Math.random() * Math.min(pool.length, 25))];

                if (pick) {
                    playlist.push(pick);
                    hourArtKeys.push(pick.artistKey);
                    hourTitKeys.push(pick.titleKey);
                    sessionStorage.setItem(`atg_art_${pick.artistKey}`, now.toString());
                    sessionStorage.setItem(`atg_tit_${pick.titleKey}`, now.toString());
                    genderHistory.push(pick.gender);
                    if (genderHistory.length > 2) genderHistory.shift();
                    lastYear = pick.year;
                }
            }
            updateDebug();
            display(playlist);
        }

        function display(list) {
            let out = "";
            list.forEach((s, index) => {
                out += `${(index + 1).toString().padStart(2, '0')} ${s.artist.toUpperCase()} - ${s.title}\n`;
            });
            document.getElementById('playlistDisplay').innerText = out;
            document.getElementById('outputArea').style.display = 'block';
            document.getElementById('bottomControls').style.display = 'block';
        }

        function downloadTxt() {
            const content = document.getElementById('playlistDisplay').innerText;
            const blob = new Blob([content], {type: 'text/plain'});
            const a = document.createElement("a");
            a.download = "ATG_Playlist.txt";
            a.href = URL.createObjectURL(blob);
            a.click();
        }

        function manualReset() { sessionStorage.clear(); location.reload(); }
        fetchLibrary();
    </script>
</body>
</html>
