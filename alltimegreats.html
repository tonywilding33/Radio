<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony Wilding">
    <title>ALL TIME GREATS | Playlist Generator</title>
    <style>
        /* Rebranded Style from File 1[cite: 1] */
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --success: #10b981; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
            -webkit-user-select: none; user-select: none;
        }
        .box { 
            width: 100%; max-width: 550px; background: var(--card); padding: 30px; 
            border-radius: 16px; border: 1px solid #334155; display: flex; flex-direction: column;
        }
        h2 { 
            font-size: 1.6rem; margin-bottom: 25px; text-align: center; color: var(--accent); 
            letter-spacing: 2px; text-transform: uppercase; margin-top: 0;
        }
        .status { 
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; 
            margin-bottom: 20px; padding: 12px; background: #0f172a; border-radius: 8px; 
            border: 1px solid #475569; text-align: center; 
        }
        .controls { margin-top: 20px; text-align: center; order: 3; }
        button { 
            width: 100%; background: var(--accent); color: #0f172a; border: none; 
            padding: 16px; border-radius: 8px; font-weight: 800; cursor: pointer; 
            text-transform: uppercase; margin-bottom: 10px;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background: #475569; cursor: not-allowed; color: #94a3b8; }
        
        #outputArea { order: 2; margin-top: 20px; }
        pre { 
            background: #0f172a; color: #fff; padding: 20px; border-radius: 8px; 
            font-size: 0.9rem; white-space: pre-wrap; border-left: 4px solid var(--accent); 
            line-height: 1.6; font-family: 'Segoe UI', monospace; overflow-x: auto; margin: 0;
        }
        /* Footer credits[cite: 1, 3] */
        .credit-footer { width: 100%; text-align: center; color: #f8fafc; font-size: 0.6rem; padding: 25px 0; text-transform: uppercase; opacity: 0.8; line-height: 1.5; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="box">
        <h2>ALL TIME GREATS</h2>
        <div id="loadStatus" class="status">INITIALIZING...</div>
        
        <div id="outputArea" style="display:none;">
            <pre id="playlistDisplay"></pre>
        </div>

        <div class="controls">
            <button id="initialGenBtn" onclick="generatePlaylist()" disabled>Generate Show</button>
            <div id="bottomControls" style="display:none;">
                <button style="background:var(--success); color:white;" onclick="downloadTxt()">Download Playlist (.txt)</button>
                <button id="nextBtn" onclick="generatePlaylist()">Generate Next Show</button>
                <button style="background:#475569; color:white;" onclick="manualReset()">Clear Session Memory</button>
            </div>
        </div>
    </div>

    <div class="credit-footer">
        Developed by Tony Wilding<br>
        National Request Chart Data (Top 500) Contributed by Mark W Snowdon
    </div>

    <script>
        /* Targeted Database: Radio Repo / New Filename[cite: 1, 3] */
        const BASE_URL = 'https://raw.githubusercontent.com/tonywilding33/Radio/main/ATG3328152A.csv';
        const GITHUB_URL = `${BASE_URL}?v=${Math.random()}`;
        let libraryData = [];

        /* Prying Eyes Protection[cite: 1] */
        document.onkeydown = (e) => {
            if([123, 85, 73, 74, 67].includes(e.keyCode) && (e.ctrlKey || e.shiftKey || e.keyCode == 123)) return false;
        };

        function parseCSV(text) {
            const rows = []; let currRow = []; let currField = ""; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i+1] === '"') { currField += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    currRow.push(currField.trim()); currField = "";
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (currField || currRow.length > 0) { currRow.push(currField.trim()); rows.push(currRow); }
                    currRow = []; currField = "";
                    if (char === '\r' && text[i+1] === '\n') i++;
                } else { currField += char; }
            }
            if (currField || currRow.length > 0) { currRow.push(currField.trim()); rows.push(currRow); }
            return rows;
        }

        async function fetchLibrary() {
            const status = document.getElementById('loadStatus');
            const strategies = [
                GITHUB_URL,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(GITHUB_URL)}`,
                `https://corsproxy.io/?${encodeURIComponent(GITHUB_URL)}`
            ];

            for (let url of strategies) {
                try {
                    status.innerText = `CONNECTING...`;
                    let response = await fetch(url);
                    if (response.ok) {
                        const text = await response.text();
                        if (text.length > 100) { processData(text); return; }
                    }
                } catch (e) { console.log("Attempt failed"); }
            }
            status.innerText = "CONNECTION FAILED. CHECK GITHUB.";
        }

        function processData(csvText) {
            const status = document.getElementById('loadStatus');
            const parsed = parseCSV(csvText);
            const headers = parsed[0].map(h => h.replace(/[^\x20-\x7E]/g, "").trim());
            
            // Map columns based on File 3 logic[cite: 3]
            libraryData = parsed.slice(1).map((cols, i) => {
                if (cols.length < 2) return null;
                return {
                    artist: cols[0],   
                    title: cols[1],    
                    score: parseFloat(cols[26]) || 0, 
                    gender: cols[27] || 'M',  
                    year: parseInt(cols[28]) || 1980     
                };
            }).filter(r => r && r.artist && r.artist !== "0" && r.artist !== "Artist");

            status.innerText = `CONNECTED: ${libraryData.length} GREATS LOADED.`;
            status.style.background = "#10b981"; status.style.color = "white";
            document.getElementById('initialGenBtn').disabled = false;
        }

        function generatePlaylist() {
            let playlist = [];
            let artistHistory = [];
            let genderHistory = [];
            let lastYear = 0;

            const sorted = [...libraryData].sort((a, b) => b.score - a.score);

            for (let i = 0; i < 16; i++) {
                let pool = sorted.filter(r => {
                    const artRepeat = artistHistory.includes(r.artist);
                    const genderClump = genderHistory.length >= 2 && 
                                        genderHistory[genderHistory.length-1] === r.gender && 
                                        genderHistory[genderHistory.length-2] === r.gender;
                    const eraClump = lastYear !== 0 && Math.abs(r.year - lastYear) < 5;
                    
                    return !artRepeat && !genderClump && !eraClump;
                });

                if (pool.length === 0) pool = sorted;

                let pick = pool[Math.floor(Math.random() * Math.min(pool.length, 40))];

                if (pick) {
                    playlist.push(pick);
                    artistHistory.push(pick.artist);
                    genderHistory.push(pick.gender);
                    lastYear = pick.year;
                    if (genderHistory.length > 2) genderHistory.shift();
                }
            }

            display(playlist);
        }

        function display(list) {
            let out = "";
            list.forEach((s, index) => {
                let num = (index + 1).toString().padStart(2, '0');
                out += `${num} ${s.artist.toUpperCase()} - ${s.title}\n`;
            });
            document.getElementById('playlistDisplay').innerText = out;
            document.getElementById('outputArea').style.display = 'block';
            document.getElementById('initialGenBtn').style.display = 'none';
            document.getElementById('bottomControls').style.display = 'block';
        }

        function downloadTxt() {
            const content = document.getElementById('playlistDisplay').innerText;
            const blob = new Blob([content], {type: 'text/plain'});
            const a = document.createElement("a");
            a.download = "AllTimeGreats_Log.txt";
            a.href = URL.createObjectURL(blob);
            a.click();
        }

        function manualReset() { sessionStorage.clear(); location.reload(); }
        fetchLibrary();
    </script>
</body>
</html>
