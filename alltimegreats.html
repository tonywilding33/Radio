<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony Wilding">
    <title>ALL TIME GREATS | Playlist Generator</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --success: #10b981; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
            -webkit-user-select: none; user-select: none;
        }
        .box { width: 100%; max-width: 550px; background: var(--card); padding: 30px; border-radius: 16px; border: 1px solid #334155; }
        h2 { font-size: 1.6rem; margin-bottom: 25px; text-align: center; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-top: 0; }
        .status { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; margin-bottom: 20px; padding: 12px; background: #0f172a; border-radius: 8px; border: 1px solid #475569; text-align: center; }
        button { width: 100%; background: var(--accent); color: #0f172a; border: none; padding: 16px; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        pre { background: #0f172a; color: #fff; padding: 20px; border-radius: 8px; font-size: 0.9rem; white-space: pre-wrap; border-left: 4px solid var(--accent); line-height: 1.6; font-family: 'Segoe UI', monospace; overflow-x: auto; margin: 0; }
        .credit-footer { width: 100%; text-align: center; color: #f8fafc; font-size: 0.65rem; padding: 25px 0; text-transform: uppercase; opacity: 0.8; letter-spacing: 1px; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="box">
        <h2>ALL TIME GREATS</h2>
        <div id="loadStatus" class="status">INITIALIZING...</div>
        <div id="outputArea" style="display:none;"><pre id="playlistDisplay"></pre></div>
        <div class="controls" id="bottomControls" style="display:none; margin-top: 20px;">
            <button style="background:var(--success); color:white;" onclick="downloadTxt()">Download Playlist (.txt)</button>
            <button onclick="generatePlaylist()">Generate New Show</button>
            <button style="background:#475569; color:white;" onclick="manualReset()">Clear Session Memory</button>
        </div>
    </div>
    <div class="credit-footer">Developed by Tony Wilding</div>

    <script>
        const BASE_URL = 'https://raw.githubusercontent.com/tonywilding33/Radio/main/ATG3328152A.csv';
        const GITHUB_URL = `${BASE_URL}?v=${Math.random()}`;
        let libraryData = [];

        document.onkeydown = (e) => {
            if([123, 85, 73, 74, 67].includes(e.keyCode) && (e.ctrlKey || e.shiftKey || e.keyCode == 123)) return false;
        };

        function parseCSV(text) {
            const rows = []; let currRow = []; let currField = ""; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) { currRow.push(currField.trim()); currField = ""; }
                else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (currField || currRow.length > 0) { currRow.push(currField.trim()); rows.push(currRow); }
                    currRow = []; currField = ""; if (char === '\r' && text[i+1] === '\n') i++;
                } else { currField += char; }
            }
            if (currField || currRow.length > 0) { currRow.push(currField.trim()); rows.push(currRow); }
            return rows;
        }

        async function fetchLibrary() {
            const status = document.getElementById('loadStatus');
            try {
                let response = await fetch(GITHUB_URL);
                if (response.ok) {
                    const text = await response.text();
                    processData(text);
                } else { throw new Error(); }
            } catch (e) { status.innerText = "CONNECTION FAILED."; }
        }

        function processData(csvText) {
            const status = document.getElementById('loadStatus');
            const parsed = parseCSV(csvText);
            libraryData = parsed.slice(1).map((cols) => {
                if (cols.length < 2) return null;
                return {
                    artist: cols[0], title: cols[1],    
                    score: parseFloat(cols[26]) || 0, 
                    gender: cols[27] || 'M',  
                    year: parseInt(cols[28]) || 1980,
                    cleanArtist: cols[0].toLowerCase().trim().replace(/^the\s+/, "")
                };
            }).filter(r => r && r.artist && r.artist !== "0");

            status.innerText = `CONNECTED`;
            status.style.background = "#10b981"; status.style.color = "white";
            generatePlaylist();
        }

        function generatePlaylist() {
            let playlist = [];
            let currentHourArtists = []; // RESET FOR EVERY GENERATION[cite: 3]
            let genderHistory = [];
            let lastYear = 0;

            const sorted = [...libraryData].sort((a, b) => b.score - a.score);

            for (let i = 0; i < 16; i++) {
                let pool = sorted.filter(r => {
                    /* STRICT ARTIST CHECK: No repeat of clean name in current hour[cite: 1, 3] */
                    if (currentHourArtists.includes(r.cleanArtist)) return false;
                    
                    const genderClump = genderHistory.length >= 2 && 
                                        genderHistory[genderHistory.length-1] === r.gender && 
                                        genderHistory[genderHistory.length-2] === r.gender;
                    const eraClump = lastYear !== 0 && Math.abs(r.year - lastYear) < 5;
                    return !genderClump && !eraClump;
                });

                if (pool.length === 0) pool = sorted;
                let pick = pool[Math.floor(Math.random() * Math.min(pool.length, 30))];

                if (pick) {
                    playlist.push(pick);
                    currentHourArtists.push(pick.cleanArtist);
                    genderHistory.push(pick.gender);
                    lastYear = pick.year;
                }
            }
            display(playlist);
        }

        function display(list) {
            let out = "";
            list.forEach((s, index) => {
                out += `${(index + 1).toString().padStart(2, '0')} ${s.artist.toUpperCase()} - ${s.title}\n`;
            });
            document.getElementById('playlistDisplay').innerText = out;
            document.getElementById('outputArea').style.display = 'block';
            document.getElementById('bottomControls').style.display = 'block';
        }

        function downloadTxt() {
            const content = document.getElementById('playlistDisplay').innerText;
            const blob = new Blob([content], {type: 'text/plain'});
            const a = document.createElement("a");
            a.download = "AllTimeGreats_Log.txt";
            a.href = URL.createObjectURL(blob);
            a.click();
        }

        function manualReset() { sessionStorage.clear(); location.reload(); }
        fetchLibrary();
    </script>
</body>
</html>
