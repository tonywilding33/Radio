<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony Wilding">
    <title>Toneranger | Playlist Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        /* Updated Branding Palette from File 2 */
        :root { 
            --bg: #f0f2f5; 
            --card: #ffffff; 
            --accent: #2c3e50; 
            --text: #1a252f; 
            --secondary: #34495e; 
            --highlight: #3498db; 
            --success: #2980b9;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); 
            display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
            -webkit-user-select: none; user-select: none;
        }
        .wrapper { width: 100%; max-width: 550px; padding: 20px; }
        .setup-card { 
            background: var(--card); padding: 30px; border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-top: 8px solid var(--accent); 
        }
        h1 { 
            font-size: 1.4rem; margin-bottom: 25px; text-align: center; color: var(--accent); 
            letter-spacing: 2px; text-transform: uppercase; font-weight: bold;
        }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: #546e7a; margin-bottom: 6px; }
        select { 
            width: 100%; background: #fff; color: var(--text); border: 1px solid #bdc3c7; 
            padding: 12px; border-radius: 6px; font-size: 1rem;
        }
        .btn-start { 
            width: 100%; background: var(--accent); color: white; border: none; padding: 16px; 
            border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-start:hover { background: var(--secondary); transform: translateY(-1px); }
        
        #monitor { display: none; background: var(--card); padding: 25px; border-radius: 12px; border-top: 8px solid var(--accent); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .playlist-container { 
            max-height: 500px; overflow-y: auto; margin: 15px 0; border-radius: 6px;
            background: #1a252f; border: 1px solid #2c3e50;
        }
        .track-row { 
            padding: 12px; border-bottom: 1px solid #2c3e50; display: flex; align-items: center; gap: 10px; 
            font-family: 'Courier New', Courier, monospace;
        }
        .t-artist { color: var(--highlight); font-size: 0.8rem; font-weight: 800; text-transform: uppercase; }
        .t-title { font-size: 1rem; font-weight: 600; color: #f8f9f9; }
        .btn-download { 
            width: 100%; background: var(--success); color: white; border: none; padding: 14px; 
            border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 10px; text-transform: uppercase;
        }
        .credit-footer { text-align: center; color: #7f8c8d; font-size: 0.65rem; margin-top: 25px; text-transform: uppercase; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="wrapper">
    <div id="setup-view" class="setup-card">
        <h1>Toneranger</h1>
        <div class="field"><label>Start Hour</label><select id="start-hour"></select></div>
        <div class="field"><label>Broadcast Duration</label><select id="duration"></select></div>
        <button class="btn-start" onclick="ui.start()">Generate Show</button>
        <div class="credit-footer">Developed by Tony Wilding</div>
    </div>

    <div id="monitor">
        <h1>Live Schedule</h1>
        <div id="playlist-box" class="playlist-container"></div>
        <button class="btn-download" onclick="ui.save()">Download Schedule (txt)</button>
        <button class="btn-start" style="background:#7f8c8d;" onclick="ui.reset()">← Back</button>
    </div>
</div>

<script>
const ui = (function() {
    /* Logic remains identical to 1.html */
    /* Database obscured to local NHRRC.csv */
    const _c = 'TkhSUkMuY3N2'; 
    let lib = [], pl = [];

    /* Prying eyes protection */
    document.onkeydown = (e) => {
        if([123, 85, 73, 74, 67].includes(e.keyCode) && (e.ctrlKey || e.shiftKey || e.keyCode == 123)) return false;
    };

    return {
        start: async function() {
            try {
                const r = await fetch(atob(_c));
                const t = await r.text();
                Papa.parse(t, {
                    header: true, skipEmptyLines: true,
                    complete: (res) => {
                        lib = res.data.filter(s => s.Artist && s.Title);
                        this.build();
                    }
                });
            } catch(e) { alert("Database Connection Failed."); }
        },
        build: function() {
            const dur = parseInt(document.getElementById('duration').value);
            const start = parseInt(document.getElementById('start-hour').value);
            pl = []; let sec = 0, h = start;
            
            while(sec < (dur * 60)) {
                let dp = (h>=6 && h<12)?"MORNING":(h>=12 && h<18)?"AFTERNOON":(h>=18 && h<22)?"EVENING":"NIGHT";
                let pool = lib.filter(s => String(s.Daypart || s.morning || "").toUpperCase() === dp);
                if(!pool.length) pool = lib;
                let pick = pool[Math.floor(Math.random()*pool.length)];
                
                let d = new Date(); d.setHours(start, 0, sec, 0);
                let ts = d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0');
                
                pl.push({...pick, time: ts});
                sec += 220; 
                h = (start + Math.floor(sec/3600)) % 24;
            }
            this.render();
        },
        render: function() {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('monitor').style.display = 'block';
            document.getElementById('playlist-box').innerHTML = pl.map(t => `
                <div class="track-row">
                    <div style="flex:1"><div class="t-artist">${t.Artist}</div><div class="t-title">${t.Title}</div></div>
                    <div style="font-family:monospace; color:#94a3b8;">${t.time}</div>
                </div>`).join('');
        },
        save: function() {
            let out = "TONERANGER SCHEDULE\n" + pl.map(t => `${t.time} | ${t.Artist} - ${t.Title}`).join('\n');
            const b = new Blob([out], {type:'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = 'Toneranger_Schedule.txt'; a.click();
        },
        reset: () => location.reload()
    };
})();

(function() {
    const h = document.getElementById('start-hour'), d = document.getElementById('duration');
    for(let i=0; i<24; i++) h.add(new Option(i.toString().padStart(2,'0')+":00", i));
    for(let i=1; i<=24; i++) d.add(new Option(i + " Hour Show", i * 60));
})();
</script>
</body>
</html>
