<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony Wilding">
    <title>Hospital Radio | Playlist Generator</title>
    <style>
        /* Styles adapted from 1.html example */
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --success: #10b981; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); 
            display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
            -webkit-user-select: none; user-select: none;
        }
        .box { 
            width: 100%; max-width: 550px; background: var(--card); padding: 30px; 
            border-radius: 16px; border: 1px solid #334155; display: flex; flex-direction: column;
        }
        h2 { 
            font-size: 1.6rem; margin-bottom: 25px; text-align: center; color: var(--accent); 
            letter-spacing: 2px; text-transform: uppercase; margin-top: 0;
        }
        .status { 
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; 
            margin-bottom: 20px; padding: 12px; background: #0f172a; border-radius: 8px; 
            border: 1px solid #475569; text-align: center; 
        }
        .controls { margin-top: 20px; text-align: center; order: 3; }
        button { 
            width: 100%; background: var(--accent); color: #0f172a; border: none; 
            padding: 16px; border-radius: 8px; font-weight: 800; cursor: pointer; 
            text-transform: uppercase; margin-bottom: 10px;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background: #475569; cursor: not-allowed; color: #94a3b8; }
        
        #outputArea { order: 2; margin-top: 20px; }
        pre { 
            background: #0f172a; color: #fff; padding: 20px; border-radius: 8px; 
            font-size: 0.9rem; white-space: pre-wrap; border-left: 4px solid var(--accent); 
            line-height: 1.6; font-family: 'Segoe UI', monospace; overflow-x: auto; margin: 0;
        }
        .credit-footer { text-align: center; color: #f8fafc; font-size: 0.65rem; margin-top: 25px; text-transform: uppercase; opacity: 0.9; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="box">
        <h2>Hospital Radio</h2>
        <div id="loadStatus" class="status">INITIALIZING...</div>
        
        <div id="outputArea" style="display:none;">
            <pre id="playlistDisplay"></pre>
        </div>

        <div class="controls">
            <button id="initialGenBtn" onclick="generateAdvancedShow()" disabled>Generate Show</button>
            <div id="bottomControls" style="display:none;">
                <button style="background:var(--success); color:white;" onclick="downloadTxt()">Download Playlist (.txt)</button>
                <button id="nextHourBtn" onclick="generateAdvancedShow()">Generate Next Hour</button>
                <button style="background:#475569; color:white;" onclick="manualReset()">Clear Session Memory</button>
            </div>
        </div>
        <div class="credit-footer">Developed by Tony Wilding</div>
    </div>

    <script>
        // DB Hosted in same location as file[cite: 2]
        const DB_FILE = 'NHRRC.csv';
        let libraryData = [];

        // Protection for prying eyes[cite: 1]
        document.onkeydown = (e) => {
            if([123, 85, 73, 74, 67].includes(e.keyCode) && (e.ctrlKey || e.shiftKey || e.keyCode == 123)) return false;
        };

        // Logic remains identical to 2.html[cite: 2]
        function parseCSV(text) {
            const rows = [];
            let currRow = [];
            let currField = "";
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i+1] === '"') { currField += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    currRow.push(currField.trim());
                    currField = "";
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (currField || currRow.length > 0) {
                        currRow.push(currField.trim());
                        rows.push(currRow);
                    }
                    currRow = []; currField = "";
                    if (char === '\r' && text[i+1] === '\n') i++;
                } else { currField += char; }
            }
            if (currField || currRow.length > 0) {
                currRow.push(currField.trim());
                rows.push(currRow);
            }
            return rows;
        }

        async function fetchLibrary() {
            const status = document.getElementById('loadStatus');
            // Using exact same connection logic from 2.html[cite: 2]
            const endpoints = [
                DB_FILE,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(window.location.href.replace(/[^/]*$/, '') + DB_FILE)}`
            ];

            for (let url of endpoints) {
                try {
                    status.innerText = `CONNECTING...`;
                    let response = await fetch(url);
                    if (response.ok) {
                        const text = await response.text();
                        if (text.length > 10) {
                            processData(text);
                            return;
                        }
                    }
                } catch (e) { console.log("Method failed"); }
            }
            status.innerText = "CONNECTION FAILED.";
        }

        function processData(csvText) {
            const status = document.getElementById('loadStatus');
            const parsed = parseCSV(csvText);
            const headers = parsed[0].map(h => h.replace(/[^\x20-\x7E]/g, "").trim());
            const headersLower = headers.map(h => h.toLowerCase());
            const findIdx = (terms) => headersLower.findIndex(h => terms.some(t => h === t || h.includes(t)));
            
            const idx = {
                artist: findIdx(["artist"]),
                title: findIdx(["song title", "title"]),
                gender: findIdx(["gender"]),
                year: findIdx(["year"]),
                pos: headers.indexOf("TY")
            };

            if (idx.pos === -1) idx.pos = headersLower.indexOf("ty");

            libraryData = parsed.slice(1).map((cols, i) => {
                if (cols.length < 2) return null;
                const yr = parseInt(cols[idx.year]) || 1980;
                let rawPos = cols[idx.pos] ? cols[idx.pos].trim() : "UR";
                let posVal = 999; 

                if (rawPos !== "" && !isNaN(rawPos)) {
                    posVal = parseInt(rawPos);
                    rawPos = posVal.toString();
                } else {
                    rawPos = "UR";
                }

                return {
                    id: i,
                    artist: cols[idx.artist] || "Unknown",
                    title: cols[idx.title] || "Unknown",
                    gender: (cols[idx.gender] || 'M').toUpperCase().substring(0,1),
                    year: yr,
                    decade: Math.floor(yr / 10) * 10,
                    pos: rawPos,
                    chartRank: posVal 
                };
            }).filter(r => r && r.artist && r.artist !== "0" && r.artist !== "Artist");

            status.innerText = `READY: ${libraryData.length} SONGS.`;
            status.style.background = "#10b981";
            status.style.color = "white";
            document.getElementById('initialGenBtn').disabled = false;
        }

        function manualReset() {
            sessionStorage.clear();
            alert("Session history cleared.");
        }

        function getArtistKey(name) {
            if (!name) return "unknown";
            let s = name.toLowerCase().trim().replace(/^the\s+/, "");
            s = s.split(/\s+and\s+/)[0].split(/\s*&\s*/)[0].split(/\s+feat\s+/)[0];
            s = s.replace(/[^a-z0-9]/g, ""); 
            if (s.length > 4 && s.endsWith('s')) s = s.slice(0, -1);
            return s;
        }

        function getTitleKey(title) {
            return title.toLowerCase().trim().replace(/[^a-z0-9]/g, "");
        }

        function generateAdvancedShow() {
            let currentHourArtKeys = [];
            let lastTrack = null;
            let decadeCount = {};
            
            function pickTrack() {
                let pool = libraryData.filter(t => {
                    const artKey = getArtistKey(t.artist);
                    const titleKey = getTitleKey(t.title);
                    const lastArtist = sessionStorage.getItem(`played_artist_${artKey}`);
                    const lastTitle = sessionStorage.getItem(`played_title_${titleKey}`);
                    
                    if (lastArtist && (Date.now() - parseInt(lastArtist) < 7200000)) return false;
                    if (lastTitle && (Date.now() - parseInt(lastTitle) < 14400000)) return false;
                    if (currentHourArtKeys.includes(artKey)) return false;
                    if ((decadeCount[t.decade] || 0) >= 4) return false;
                    
                    if (lastTrack) {
                        if (t.gender === lastTrack.gender) return false;
                        if (t.year === lastTrack.year) return false;
                    }
                    return true;
                });

                if (pool.length === 0) {
                    sessionStorage.clear();
                    pool = libraryData.filter(t => !currentHourArtKeys.includes(getArtistKey(t.artist)));
                }

                let weightedPool = [];
                pool.forEach(t => {
                    let tickets = (t.chartRank > 0 && t.chartRank <= 100) ? 5 : 1;
                    for (let i = 0; i < tickets; i++) { weightedPool.push(t); }
                });

                const track = weightedPool[Math.floor(Math.random() * weightedPool.length)];
                const aKey = getArtistKey(track.artist);
                const tKey = getTitleKey(track.title);
                
                currentHourArtKeys.push(aKey);
                sessionStorage.setItem(`played_artist_${aKey}`, Date.now());
                sessionStorage.setItem(`played_title_${tKey}`, Date.now());
                
                decadeCount[track.decade] = (decadeCount[track.decade] || 0) + 1;
                lastTrack = track;
                return track;
            }

            let output = "";
            for (let i = 0; i < 14; i++) {
                let track = pickTrack();
                output += `${String(i + 1).padStart(2, '0')} ${track.artist} - ${track.title} (Chart: ${track.pos})\n`;
            }

            output += "\nOPTIONAL FILLERS\n\n";
            for (let i = 0; i < 4; i++) {
                let track = pickTrack();
                output += `${String(i + 15).padStart(2, '0')} ${track.artist} - ${track.title} (Chart: ${track.pos})\n`;
            }

            document.getElementById('playlistDisplay').innerText = output;
            document.getElementById('outputArea').style.display = 'block';
            document.getElementById('initialGenBtn').style.display = 'none';
            document.getElementById('bottomControls').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }

        function downloadTxt() {
            const text = document.getElementById('playlistDisplay').innerText;
            const blob = new Blob([text], { type: 'text/plain' });
            const anchor = document.createElement('a');
            anchor.download = 'Hospital_Radio_Playlist.txt';
            anchor.href = URL.createObjectURL(blob);
            anchor.click();
        }

        fetchLibrary();
    </script>
</body>
</html>
