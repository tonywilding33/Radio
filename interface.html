<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony Wilding"> <title>Hospital Radio Scheduler | Professional Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #00e5ff; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Dashboard Styling */
        .config-panel { background: var(--panel); padding: 20px; border-radius: 8px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .control-group { display: flex; flex-direction: column; }
        label { font-size: 0.8em; text-transform: uppercase; margin-bottom: 5px; color: #888; }
        select, input, button { background: #2a2a2a; color: white; border: 1px solid #444; padding: 10px; border-radius: 4px; }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; }
        button:hover { background: #00b8cc; }

        #monitor { background: #000; padding: 30px; border-radius: 8px; border-left: 5px solid var(--accent); margin-bottom: 20px; }
        .now-playing-title { font-size: 2.5em; font-weight: bold; margin: 0; color: var(--accent); }
        .now-playing-artist { font-size: 1.5em; opacity: 0.8; }
        .status-bar { display: flex; justify-content: space-between; margin-top: 20px; font-size: 0.9em; color: #666; border-top: 1px solid #222; padding-top: 10px; }
        
        #log-container { background: var(--panel); height: 300px; overflow-y: scroll; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9em; }
        .log-entry { padding: 5px 0; border-bottom: 1px solid #222; }
        .log-time { color: var(--accent); margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="margin-bottom: 5px;">Hospital Broadcast Interface</h1>
    <p style="margin-top: 0; color: #666;">Automated Scheduling Engine v3.0</p>

    <div class="config-panel">
        <div class="control-group">
            <label>1. Load Database</label>
            <input type="file" id="csv-file" accept=".csv">
        </div>

        <div class="control-group">
            <label>2. Set Start Time</label>
            <select id="start-time">
                </select>
        </div>

        <div class="control-group">
            <label>3. Broadcast Duration</label>
            <select id="duration">
                <option value="60">1 Hour</option>
                <option value="120">2 Hours</option>
                <option value="240">4 Hours</option>
                <option value="480">8 Hours</option>
                <option value="1440">24 Hours (Full Cycle)</option>
            </select>
        </div>

        <button onclick="initializeBroadcast()">START BROADCAST</button>
    </div>

    <div id="monitor">
        <label>Now Playing</label>
        <p id="display-artist" class="now-playing-artist">Ready to Initialize...</p>
        <p id="display-track" class="now-playing-title">Awaiting CSV Data</p>
        
        <div class="status-bar">
            <span id="logic-status">Rules: Offline</span>
            <span id="session-time">Time: --:--</span>
        </div>
    </div>

    <h3>Rotation History</h3>
    <div id="log-container">
        <div id="log-list"></div>
    </div>
</div>

<div style="display:none;" aria-hidden="true">Developed by Tony Wilding</div>

<script>
    // Initialization of Dropdowns
    const startTimeSelect = document.getElementById('start-time');
    for(let i=0; i<24; i++) {
        let hour = i.toString().padStart(2, '0') + ":00";
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = hour;
        startTimeSelect.appendChild(opt);
    }

    // Placeholder for data
    let masterLibrary = [];
    let playHistory = [];
    const SONG_SEP_MINS = 240;
    const ARTIST_SEP_MINS = 100;

    function initializeBroadcast() {
        const fileInput = document.getElementById('csv-file');
        if (!fileInput.files[0]) {
            alert("Please upload the song database CSV first.");
            return;
        }

        Papa.parse(fileInput.files[0], {
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function(results) {
                masterLibrary = results.data;
                const startTime = document.getElementById('start-time').value;
                const duration = document.getElementById('duration').value;
                
                console.log(`Starting broadcast logic for ${startTime}:00 with ${duration} min duration.`);
                generateNextTrack();
            }
        });
    }

    // Logic for next track will be inserted here...
</script>

</body>
</html>
