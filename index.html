<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Portal | Stand By</title>
    <style>
        :root {
            --bg: #0f172a;
            --accent: #38bdf8;
            --text: #94a3b8;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }
        .container {
            padding: 20px;
        }
        .status-light {
            width: 12px;
            height: 12px;
            background-color: var(--accent);
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 0 15px var(--accent);
            animation: pulse 2s infinite;
        }
        h1 {
            color: #f8fafc;
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 400;
        }
        p {
            font-size: 0.75rem;
            letter-spacing: 1px;
            opacity: 0.6;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-light"></div>
        <h1>System Standby</h1>
        <p>Updates are currently in progress.</p>
    </div>

    <div class="footer">
        Developed by Tony Wilding
    </div>

</body>
</html>
