<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony Wilding">
    <title>Station | Maintenance</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --accent: #f97316; /* Deep Orange */
            --text: #94a3b8; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        /* Discrete Orange Sphere */
        .discrete-ball {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 35% 35%, #fb923c, var(--accent));
            border-radius: 50%;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.5),
                inset -10px -10px 20px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: pulse-slow 6s infinite ease-in-out;
            border: 1px solid rgba(249, 115, 22, 0.2);
        }

        .discrete-ball:hover {
            transform: scale(1.1);
            filter: brightness(1.1);
            box-shadow: 0 0 40px rgba(249, 115, 22, 0.2);
        }

        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; }
        }

        .msg {
            margin-top: 40px;
            color: var(--text);
            font-size: 0.6rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            color: #334155;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- Small Discrete Ball as the only active element -->
    <div class="discrete-ball" onclick="location.href='tunesmith6.html'"></div>

    <div class="msg">Database Maintenance in Progress</div>

    <div class="footer">Developed by Tony Wilding</div>

</body>
</html>
