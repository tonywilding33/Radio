<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony Wilding">
    <title>Station | Maintenance</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --orange: #f97316; 
            --text: #475569; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        /* Tiny Discrete Ball - Status Indicator Style */
        .tiny-ball {
            width: 20px; 
            height: 20px;
            background: radial-gradient(circle at 35% 35%, #fb923c, var(--orange));
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.15);
            cursor: pointer;
            transition: all 0.5s ease;
            animation: breathe 5s infinite ease-in-out;
        }

        .tiny-ball:hover {
            transform: scale(1.3);
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.4);
            filter: brightness(1.2);
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.5; filter: saturate(0.8); }
            50% { opacity: 1; filter: saturate(1.2); }
        }

        .status-msg {
            margin-top: 20px;
            color: var(--text);
            font-size: 0.5rem;
            font-weight: 800;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-align: center;
            opacity: 0.6;
        }

        .footer {
            position: absolute;
            bottom: 25px;
            color: #1e293b;
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- Tiny discrete entry point -->
    <div class="tiny-ball" onclick="location.href='tunesmith6.html'"></div>

    <div class="status-msg">Maintenance</div>

    <div class="footer">Tony Wilding</div>

</body>
</html>
