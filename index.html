<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony Wilding">
    <title>Radio Scheduler | Coming Soon</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --accent: #38bdf8; 
            --gold: #fbbf24; 
            --text: #f8fafc; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        /* The Snazzy Ball */
        .sphere {
            position: relative;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle at 30% 30%, var(--accent), #1e293b);
            border-radius: 50%;
            box-shadow: 
                0 0 50px rgba(56, 189, 248, 0.3),
                inset -20px -20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: pulse 4s infinite ease-in-out;
            cursor: pointer;
            transition: transform 0.3s ease;
            z-index: 2;
        }

        .sphere:hover {
            transform: scale(1.05);
            box-shadow: 0 0 80px rgba(56, 189, 248, 0.5);
        }

        @keyframes pulse {
            0%, 100% { transform: translateY(0); box-shadow: 0 0 50px rgba(56, 189, 248, 0.3); }
            50% { transform: translateY(-15px); box-shadow: 0 0 70px rgba(56, 189, 248, 0.4); }
        }

        h1 {
            color: var(--bg); /* Dark text on the bright ball */
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            margin: 0;
            text-transform: uppercase;
        }

        .status {
            color: var(--bg);
            font-size: 0.65rem;
            font-weight: 800;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        /* Ambient Glow in background */
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.05) 0%, transparent 70%);
            z-index: 1;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            color: #475569;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }
        
        .gold-line {
            width: 40px;
            height: 2px;
            background: var(--gold);
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="sphere" onclick="location.href='tunesmith6.html'">
        <h1>STATION</h1>
        <div class="status">Coming Soon</div>
        <div class="gold-line"></div>
    </div>

    <div class="footer">Developed by Tony Wilding</div>

</body>
</html>
