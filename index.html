<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony Wilding">
    <title>Station | Private</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --orange: #f97316; 
            --text: #475569; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        /* Tiny Discrete Ball */
        .tiny-ball {
            width: 24px; /* Tiny status-light size */
            height: 24px;
            background: radial-gradient(circle at 35% 35%, #fb923c, var(--orange));
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.2);
            cursor: pointer;
            transition: all 0.5s ease;
            animation: breathe 4s infinite ease-in-out;
        }

        .tiny-ball:hover {
            transform: scale(1.4);
            box-shadow: 0 0 25px rgba(249, 115, 22, 0.5);
            filter: brightness(1.2);
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.6; box-shadow: 0 0 10px rgba(249, 115, 22, 0.1); }
            50% { opacity: 1; box-shadow: 0 0 20px rgba(249, 115, 22, 0.3); }
        }

        .status-msg {
            margin-top: 30px;
            color: var(--text);
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-align: center;
            opacity: 0.5;
        }

        .footer {
            position: absolute;
            bottom: 25px;
            color: #1e293b;
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- Tiny discrete entry point -->
    <div class="tiny-ball" onclick="location.href='tunesmith6.html'"></div>

    <div class="status-msg">System Offline</div>

    <div class="footer">Tony Wilding</div>

</body>
</html>
