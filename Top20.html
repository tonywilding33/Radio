<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony Wilding">
    <title>Top 20 Weekly Chart</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --success: #10b981; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
            -webkit-user-select: none; user-select: none;
        }
        .box { width: 100%; max-width: 650px; background: var(--card); padding: 30px; border-radius: 16px; border: 1px solid #334155; }
        h2 { font-size: 1.6rem; text-align: center; color: var(--accent); text-transform: uppercase; margin-top: 0; letter-spacing: 1px; }
        .status { font-size: 0.8rem; font-weight: 700; color: #f8fafc; margin-bottom: 20px; padding: 12px; background: #334155; border-radius: 8px; text-align: center; }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { width: 100%; background: var(--accent); color: #0f172a; border: none; padding: 18px; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 1rem; transition: background 0.3s; }
        button:disabled { background: #475569; color: #94a3b8; cursor: default; }
        .btn-download { background: var(--success); color: white; display: none; margin-bottom: 10px; }
        pre { background: #0f172a; color: #fff; padding: 15px 25px; border-radius: 8px; font-size: 1rem; white-space: pre-wrap; line-height: 1.6; font-family: 'Consolas', 'Courier New', monospace; margin-top: 20px; border-left: 5px solid var(--accent); }
        .footer { text-align: center; font-size: 0.65rem; margin-top: 25px; opacity: 0.7; text-transform: uppercase; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="box">
        <h2>Top 20 Weekly Chart</h2>
        <div id="loadStatus" class="status">FETCHING LATEST DATA...</div>
        <div id="outputArea" style="display:none;"><pre id="chartDisplay"></pre></div>
        <div class="controls" id="controlPanel">
            <button id="dlBtn" class="btn-download" onclick="downloadTxt()">Download Weekly Chart</button>
            <button id="timerBtn" disabled>Updating In 5</button>
        </div>
    </div>
    <div class="footer">Developed by Tony Wilding</div>

    <script>
        // Ensure this URL is exactly where your CSV lives
        const CSV_URL = 'https://raw.githubusercontent.com/tonywilding33/Radio/main/NHRRC_DATA.csv';
        const STAGE_DURATION = 72; 
        const TOTAL_STAGES = 5;
        let lastProcessedStage = -1;

        async function loadCSV() {
            try {
                // Using two layers of cache busting: unique URL param + Request Init
                const cacheBuster = Date.now();
                const resp = await fetch(`${CSV_URL}?nocache=${cacheBuster}`, { 
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
                });
                
                const text = await resp.text();
                const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
                
                let allSongs = lines.slice(1).map(line => {
                    // Regex to handle quoted titles with commas inside
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 5) return null;

                    const clean = (val) => val ? val.replace(/["]+/g, '').trim() : "";
                    
                    let tyPos = parseInt(clean(cols[0])); // This Week
                    let artist = clean(cols[1]);        // Artist
                    let title = clean(cols[2]);         // Title
                    // cols[3] is Category - Skipping
                    let lyRaw = clean(cols[4]);         // Last Week (Simulator)
                    
                    if (!artist || isNaN(tyPos)) return null;
                    
                    let lyPos = parseInt(lyRaw);
                    
                    // SIMULATION: If position was outside top 20 last week, it's a New Entry
                    let displayLY = (isNaN(lyPos) || lyPos === 0 || lyPos > 20) ? "NE" : lyPos;

                    return { ty: tyPos, artist, title, ly: displayLY };
                }).filter(s => s !== null);

                // Sort 1-20
                let top20 = allSongs
                    .filter(s => s.ty >= 1 && s.ty <= 20)
                    .sort((a, b) => a.ty - b.ty);

                if (top20.length > 0) {
                    renderChart(top20);
                } else {
                    document.getElementById('loadStatus').innerText = "CHART DATA EMPTY";
                }
            } catch (e) { 
                document.getElementById('loadStatus').innerText = "SYNC ERROR - RETRYING...";
                console.error("Fetch Error:", e);
            }
        }

        function renderChart(data) {
            // Countdowns usually show #20 first
            let countdown = [...data].reverse();
            let displayTxt = "--- WEEKLY TOP 20 RUNDOWN ---\n\n";
            
            countdown.forEach((s) => {
                const lw = s.ly === "NE" ? "NE" : String(s.ly).padStart(2, ' ');
                displayTxt += `${String(s.ty).padStart(2, '0')} (${lw}) ${s.artist} - ${s.title}\n`;
            });

            document.getElementById('chartDisplay').innerText = displayTxt;
            document.getElementById('outputArea').style.display = 'block';
            document.getElementById('loadStatus').style.display = 'none';
            document.getElementById('dlBtn').style.display = 'block';
        }

        function startSmartTimer() {
            const timerBtn = document.getElementById('timerBtn');
            
            function update() {
                const now = Math.floor(Date.now() / 1000);
                let sessionStart = localStorage.getItem('chartSessionStart');
                
                // If no session or cycle complete (360s), reset
                if (!sessionStart || (now - sessionStart) > (STAGE_DURATION * TOTAL_STAGES)) {
                    sessionStart = now;
                    localStorage.setItem('chartSessionStart', sessionStart);
                }

                const elapsed = now - sessionStart;
                const stageIndex = Math.floor(elapsed / STAGE_DURATION);
                const stagesLeft = TOTAL_STAGES - stageIndex;
                
                timerBtn.innerText = `Update In ${stagesLeft}`;

                // Trigger reload only when entering a new stage
                if (stageIndex !== lastProcessedStage) {
                    lastProcessedStage = stageIndex;
                    loadCSV();
                }
            }

            setInterval(update, 1000);
            update();
        }

        function downloadTxt() {
            const text = document.getElementById('chartDisplay').innerText;
            const blob = new Blob([text], { type: 'text/plain' });
            const anchor = document.createElement('a');
            anchor.download = 'Weekly_Chart.txt';
            anchor.href = URL.createObjectURL(blob);
            anchor.click();
        }

        startSmartTimer();
    </script>
</body>
</html>
