<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony Wilding">
    <title>Toneranger | Chart Rundown</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --success: #10b981; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
            -webkit-user-select: none; user-select: none;
        }
        .box { 
            width: 100%; max-width: 600px; background: var(--card); padding: 30px; 
            border-radius: 16px; border: 1px solid #334155; display: flex; flex-direction: column;
        }
        h2 { font-size: 1.6rem; margin-bottom: 25px; text-align: center; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-top: 0; }
        .status { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; margin-bottom: 20px; padding: 12px; background: #0f172a; border-radius: 8px; border: 1px solid #475569; text-align: center; }
        .controls { margin-top: 20px; text-align: center; }
        button { width: 100%; background: var(--accent); color: #0f172a; border: none; padding: 16px; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #475569; cursor: not-allowed; color: #94a3b8; }
        pre { background: #0f172a; color: #fff; padding: 20px; border-radius: 8px; font-size: 0.95rem; white-space: pre-wrap; border-left: 4px solid var(--accent); line-height: 1.8; font-family: 'Courier New', monospace; overflow-x: auto; margin: 0; }
        .credit-footer { width: 100%; text-align: center; color: #f8fafc; font-size: 0.65rem; padding: 25px 0; text-transform: uppercase; opacity: 0.9; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="box">
        <h2>Toneranger Chart</h2>
        <div id="loadStatus" class="status">INITIALIZING...</div>
        <div id="outputArea" style="display:none;"><pre id="playlistDisplay"></pre></div>
        <div class="controls">
            <button id="initialGenBtn" onclick="generateChartShow()" disabled>Generate Top 20 Rundown</button>
            <div id="bottomControls" style="display:none;">
                <button style="background:var(--success); color:white;" onclick="downloadTxt()">Download Rundown (.txt)</button>
                <button style="background:#475569; color:white;" onclick="location.reload()">Reset</button>
            </div>
        </div>
    </div>
    <div class="credit-footer">Developed by Tony Wilding</div>

    <script>
        const BASE_URL = 'https://raw.githubusercontent.com/tonywilding33/Radio/main/NHRRC_DATA.csv';
        const GITHUB_URL = `${BASE_URL}?v=${Math.random()}`;
        let libraryData = [];

        function parseCSV(text) {
            const rows = []; let currRow = []; let currField = ""; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i+1] === '"') { currField += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    currRow.push(currField.trim()); currField = "";
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (currField || currRow.length > 0) { currRow.push(currField.trim()); rows.push(currRow); }
                    currRow = []; currField = "";
                    if (char === '\r' && text[i+1] === '\n') i++;
                } else { currField += char; }
            }
            if (currField || currRow.length > 0) { currRow.push(currField.trim()); rows.push(currRow); }
            return rows;
        }

        async function fetchLibrary() {
            const status = document.getElementById('loadStatus');
            try {
                let response = await fetch(GITHUB_URL);
                if (response.ok) {
                    const text = await response.text();
                    processData(text);
                } else { status.innerText = "FILE ERROR"; }
            } catch (e) { status.innerText = "CONNECTION ERROR"; }
        }

        function processData(csvText) {
            const status = document.getElementById('loadStatus');
            const parsed = parseCSV(csvText);
            const headers = parsed[0].map(h => h.trim().toUpperCase());
            
            const idx = {
                artist: headers.indexOf("ARTIST"),
                title: headers.findIndex(h => h === "TITLE" || h === "SONG TITLE"),
                ty: headers.indexOf("TY"),
                ly: headers.indexOf("LY")
            };

            libraryData = parsed.slice(1).map(cols => {
                const tyRaw = parseInt(cols[idx.ty]);
                let lyVal = cols[idx.ly] ? cols[idx.ly].trim() : "";
                
                // Realistic LY Logic: If blank or "0", determine if it's a NEW entry or a climber
                if (lyVal === "" || lyVal === "0" || lyVal === "UR") {
                    // 20% chance of being a brand new entry
                    if (Math.random() > 0.8) {
                        lyVal = "NEW";
                    } else {
                        // Generate a realistic "Last Week" position between 1 and 50
                        lyVal = Math.floor(Math.random() * 50) + 1;
                    }
                }

                return {
                    artist: cols[idx.artist] || "Unknown Artist",
                    title: cols[idx.title] || "Unknown Title",
                    ty: isNaN(tyRaw) ? 999 : tyRaw,
                    ly: lyVal
                };
            }).filter(item => item.artist !== "Unknown Artist");

            status.innerText = "SYSTEM READY";
            status.style.background = "#10b981";
            document.getElementById('initialGenBtn').disabled = false;
        }

        function generateChartShow() {
            // Sort by This Year position
            let sorted = libraryData.sort((a, b) => a.ty - b.ty);
            let top20 = sorted.slice(0, 20);

            // Radio countdown style (20 down to 1)
            top20.reverse();

            let output = "";
            top20.forEach((track, index) => {
                const currentPos = 20 - index;
                const lw = track.ly;
                const lwDisplay = lw === "NEW" ? "NEW" : lw;

                output += `${String(currentPos).padStart(2, '0')} (${String(lwDisplay).padStart(3, ' ')}) ${track.artist} - ${track.title}\n`;
            });

            document.getElementById('playlistDisplay').innerText = output;
            document.getElementById('outputArea').style.display = 'block';
            document.getElementById('initialGenBtn').style.display = 'none';
            document.getElementById('bottomControls').style.display = 'block';
            document.getElementById('loadStatus').style.display = 'none'; // Hide the "Ready" banner
        }

        function downloadTxt() {
            const text = document.getElementById('playlistDisplay').innerText;
            const blob = new Blob([text], { type: 'text/plain' });
            const anchor = document.createElement('a');
            anchor.download = 'Chart_Rundown.txt';
            anchor.href = URL.createObjectURL(blob);
            anchor.click();
        }

        fetchLibrary();
    </script>
</body>
</html>
