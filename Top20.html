<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony Wilding">
    <title>Top 20 Chart Show</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
        }
        .box { width: 100%; max-width: 550px; background: var(--card); padding: 30px; border-radius: 16px; border: 1px solid #334155; }
        h2 { font-size: 1.6rem; text-align: center; color: var(--accent); text-transform: uppercase; margin-top: 0; }
        .status { font-size: 0.7rem; font-weight: 800; color: #94a3b8; margin-bottom: 20px; padding: 12px; background: #0f172a; border-radius: 8px; text-align: center; }
        button { width: 100%; background: var(--accent); color: #0f172a; border: none; padding: 16px; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        button:disabled { background: #475569; cursor: not-allowed; }
        pre { background: #0f172a; color: #fff; padding: 20px; border-radius: 8px; font-size: 1rem; white-space: pre-wrap; line-height: 1.6; font-family: 'Courier New', monospace; margin-top: 20px; border-left: 4px solid var(--accent); }
        .footer { text-align: center; font-size: 0.6rem; margin-top: 20px; opacity: 0.6; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Top 20 Chart</h2>
        <div id="loadStatus" class="status">INITIALIZING...</div>
        <div id="outputArea" style="display:none;"><pre id="chartDisplay"></pre></div>
        <div class="controls" id="controlPanel">
            <button id="genBtn" onclick="generateTop20()" disabled>Generate Chart</button>
        </div>
    </div>
    <div class="footer">Developed by Tony Wilding</div>

    <script>
        const CSV_URL = 'https://raw.githubusercontent.com/tonywilding33/Radio/main/NHRRC_DATA.csv';
        let songs = [];

        async function loadCSV() {
            try {
                const resp = await fetch(`${CSV_URL}?v=${Math.random()}`);
                const text = await resp.text();
                // Split by line and filter out empty lines
                const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
                const headers = lines[0].split(',').map(h => h.trim().toUpperCase());
                
                // Flexible index finding
                const iArtist = headers.indexOf("ARTIST");
                const iTitle = headers.findIndex(h => h.includes("TITLE") || h === "SONG");
                const iTY = headers.indexOf("TY");
                const iLY = headers.indexOf("LY");

                songs = lines.slice(1).map(line => {
                    // Proper CSV column splitting (handles commas inside quotes)
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    let tyVal = parseInt(cols[iTY]);
                    let artist = cols[iArtist] ? cols[iArtist].replace(/"/g, '').trim() : "";
                    let title = cols[iTitle] ? cols[iTitle].replace(/"/g, '').trim() : "";
                    let lyVal = cols[iLY] ? cols[iLY].replace(/"/g, '').trim() : "";

                    // Cleanup "last week" logic for the rundown
                    if (!lyVal || lyVal === "0" || lyVal === "UR" || lyVal === "") {
                        lyVal = Math.random() > 0.2 ? Math.floor(Math.random() * 40) + 1 : "NEW";
                    }

                    if (!artist || artist === "0") return null;

                    return { artist, title, ty: isNaN(tyVal) ? 999 : tyVal, ly: lyVal };
                }).filter(s => s !== null);

                if (songs.length > 0) {
                    document.getElementById('loadStatus').innerText = "SYSTEM READY";
                    document.getElementById('genBtn').disabled = false;
                } else {
                    document.getElementById('loadStatus').innerText = "ERROR: NO DATA FOUND";
                }
            } catch (e) { 
                document.getElementById('loadStatus').innerText = "CONNECTION FAILED"; 
            }
        }

        function generateTop20() {
            // Sort by the TY (This Year) rank ascending
            let sorted = songs.sort((a, b) => a.ty - b.ty);
            
            // Slice the best 20 and reverse for the 20-to-1 countdown
            let chartList = sorted.slice(0, 20).reverse();

            let displayTxt = "";
            chartList.forEach((s, i) => {
                const currentPos = 20 - i;
                const lastWeek = s.ly === "NEW" ? "NEW" : s.ly;
                
                // Format: Position [LastWeek] Artist - Title
                displayTxt += `${String(currentPos).padStart(2, '0')} [LW: ${String(lastWeek).padStart(3, ' ')}] ${s.artist} - ${s.title}\n`;
            });

            document.getElementById('chartDisplay').innerText = displayTxt;
            document.getElementById('outputArea').style.display = 'block';
            document.getElementById('loadStatus').style.display = 'none';
            document.getElementById('controlPanel').style.display = 'none';
        }

        loadCSV();
    </script>
</body>
</html>
