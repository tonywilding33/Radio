<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony Wilding">
    <title>Top 20 Chart Show</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --success: #10b981; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
            -webkit-user-select: none; user-select: none;
        }
        .box { width: 100%; max-width: 700px; background: var(--card); padding: 30px; border-radius: 16px; border: 1px solid #334155; }
        h2 { font-size: 1.6rem; text-align: center; color: var(--accent); text-transform: uppercase; margin-top: 0; letter-spacing: 1px; }
        .status { font-size: 0.75rem; font-weight: 800; color: #f8fafc; margin-bottom: 20px; padding: 12px; background: #334155; border-radius: 8px; text-align: center; }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { width: 100%; background: var(--accent); color: #0f172a; border: none; padding: 18px; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 1rem; }
        button:hover { opacity: 0.9; }
        .btn-download { background: var(--success); color: white; display: none; }
        pre { background: #0f172a; color: #fff; padding: 25px; border-radius: 8px; font-size: 1rem; white-space: pre-wrap; line-height: 1.8; font-family: 'Consolas', 'Courier New', monospace; margin-top: 20px; border-left: 5px solid var(--accent); }
        .footer { text-align: center; font-size: 0.65rem; margin-top: 25px; opacity: 0.7; text-transform: uppercase; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="box">
        <h2>Top 20 Chart</h2>
        <div id="loadStatus" class="status">SYNCING WITH DATABASE...</div>
        <div id="outputArea" style="display:none;"><pre id="chartDisplay"></pre></div>
        <div class="controls" id="controlPanel">
            <button id="dlBtn" class="btn-download" onclick="downloadTxt()">Download Chart (txt)</button>
            <button id="resetBtn" style="background:#475569; color:white; display:none; font-size: 0.8rem; padding: 10px;" onclick="location.reload()">Refresh from File</button>
        </div>
    </div>
    <div class="footer">Developed by Tony Wilding</div>

    <script>
        const CSV_URL = 'https://raw.githubusercontent.com/tonywilding33/Radio/main/NHRRC_DATA.csv';

        async function loadCSV() {
            const status = document.getElementById('loadStatus');
            try {
                const resp = await fetch(`${CSV_URL}?t=${new Date().getTime()}`);
                const text = await resp.text();
                const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
                
                let allSongs = lines.slice(1).map(line => {
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 3) return null;

                    const clean = (val) => val ? val.replace(/["]+/g, '').trim() : "";

                    let tyPos = parseInt(clean(cols[0]));
                    let artist = clean(cols[1]);
                    let title = clean(cols[2]);
                    let lyRaw = clean(cols[4]); 
                    let woc = clean(cols[5]) || "1";
                    let weeksAtOne = clean(cols[6]) || "0";

                    if (!artist || artist.toLowerCase() === "artist") return null;

                    let lyPos = parseInt(lyRaw);
                    // Standard Chart Logic: Strict Top 20 LW or NE
                    let displayLY = (isNaN(lyPos) || lyPos === 0 || lyPos > 20) ? "NE" : lyPos;

                    return { 
                        ty: tyPos, 
                        artist, 
                        title, 
                        ly: displayLY, 
                        woc: woc, 
                        atOne: weeksAtOne 
                    };
                }).filter(s => s !== null);

                let top20 = allSongs.filter(s => s.ty >= 1 && s.ty <= 20);
                top20.sort((a, b) => a.ty - b.ty);

                if (top20.length > 0) {
                    renderChart(top20);
                } else {
                    status.innerText = "ERROR: NO SONGS FOUND IN TOP 20";
                }
            } catch (e) { 
                status.innerText = "CONNECTION FAILED";
                status.style.background = "#ef4444";
            }
        }

        function renderChart(data) {
            let countdown = [...data].reverse();
            let displayTxt = "--- TOP 20 CHART RUNDOWN ---\n\n";

            countdown.forEach((s) => {
                const lw = s.ly === "NE" ? "NE" : String(s.ly).padStart(2, ' ');
                const weeksInfo = `[Wks: ${s.woc}]`;
                const no1Info = parseInt(s.atOne) > 0 ? ` (#1 x${s.atOne})` : "";
                
                displayTxt += `${String(s.ty).padStart(2, '0')} (${lw}) ${s.artist} - ${s.title} ${weeksInfo}${no1Info}\n`;
            });

            document.getElementById('chartDisplay').innerText = displayTxt;
            document.getElementById('outputArea').style.display = 'block';
            document.getElementById('loadStatus').style.display = 'none';
            document.getElementById('dlBtn').style.display = 'block';
            document.getElementById('resetBtn').style.display = 'block';
        }

        function downloadTxt() {
            const text = document.getElementById('chartDisplay').innerText;
            const blob = new Blob([text], { type: 'text/plain' });
            const anchor = document.createElement('a');
            anchor.download = 'Top_20_Chart.txt';
            anchor.href = URL.createObjectURL(blob);
            anchor.click();
        }

        loadCSV();
    </script>
</body>
</html>
