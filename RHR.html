<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHR | Virtual Producer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --rhr-red: #e31e24; 
            --rhr-pink-fill: #fde2e2;
            --rhr-pink-line: #f1a9a9;
            --ai-gold: #b58900; 
            --ai-bg: #fffcf0; 
        }
        body { font-family: -apple-system, sans-serif; background: #f4f4f4; padding: 10px; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 500px; padding-top: 10px; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        
        .logo-container { text-align: center; margin-bottom: 10px; }
        .rhr-logo-svg { width: 140px; height: auto; display: block; margin: 0 auto; }
        .station-name { color: var(--rhr-red); font-size: 1.4rem; font-weight: 900; text-transform: uppercase; text-align: center; margin-top: -5px; margin-bottom: 20px;}

        label { display: block; font-weight: bold; margin: 10px 0 5px; font-size: 0.85rem; color: #444; }
        select { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; -webkit-appearance: none; background: #fff; cursor: pointer; }
        
        .btn { width: 100%; border: none; padding: 16px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-bottom: 10px; }
        .btn-main { background: var(--rhr-red); color: #fff; }
        .btn-sec { background: #555; color: #fff; }
        .btn-outline { background: transparent; border: 1px solid #ddd; color: #777; }

        #playlist-box { border: 1px solid #eee; border-radius: 8px; max-height: 400px; overflow-y: auto; margin: 15px 0; }
        .track-row { display: flex; padding: 12px; border-bottom: 1px solid #f9f9f9; align-items: center; }
        .track-row.ai-fill { background-color: var(--ai-bg) !important; border-left: 4px solid var(--ai-gold); }
        .track-row.recovery-fill { background-color: #ffebeb !important; border-left: 4px solid var(--rhr-red); }
        .track-info { flex-grow: 1; }
        .t-artist { font-weight: bold; font-size: 0.95rem; }
        .t-title { color: #666; font-size: 0.85rem; }
        .time-col { font-weight: bold; color: var(--rhr-red); font-family: monospace; }
        .ai-label { font-size: 0.6rem; font-weight: 800; display: block; }
        .footer { text-align: center; font-size: 0.6rem; color: #aaa; margin-top: 15px; text-transform: uppercase; }
        .mode-indicator { font-size: 0.7rem; text-align: center; margin-bottom: 10px; font-weight: bold; color: #888; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="setup-view" class="card">
        <div class="logo-container">
            <svg class="rhr-logo-svg" viewBox="0 0 160 140" xmlns="http://www.w3.org/2000/svg">
                <path d="M80 120C80 120 20 85 20 45C20 25 35 15 50 15C60 15 72 22 80 35C88 22 100 15 110 15C125 15 140 25 140 45C140 85 80 120 80 120Z" fill="var(--rhr-pink-fill)" />
                <path d="M80 125C80 125 15 88 15 45C15 22 32 10 50 10C62 10 74 18 80 30C86 18 98 10 110 10C128 10 145 22 145 45C145 88 80 125 80 125Z" fill="none" stroke="var(--rhr-pink-line)" stroke-width="2" />
                <path d="M80 115C80 115 25 82 25 45C25 28 38 20 50 20C60 20 72 25 80 35C88 25 100 20 110 20C122 20 135 28 135 45C135 82 80 115 80 115Z" fill="none" stroke="var(--rhr-pink-line)" stroke-width="1.5" />
                <text x="50%" y="65%" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="48" fill="var(--rhr-red)" font-weight="900">RHR</text>
            </svg>
        </div>
        <div class="station-name">Rugby Hospital Radio</div>
        <div id="mode-text" class="mode-indicator"></div>

        <label>Start Hour</label><select id="start-hour"></select>
        <label>Duration (Hours)</label><select id="duration"></select>
        
        <button class="btn btn-main" onclick="connectAndBuild()">GENERATE BROADCAST LOG</button>
    </div>

    <div id="monitor" style="display:none;" class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:900; color:var(--rhr-red)">STATION LOG</span>
            <span id="track-count" style="font-size:0.7rem; font-weight:bold;"></span>
        </div>
        <div id="playlist-box"></div>
        <button class="btn btn-main" onclick="copyToClipboard()">📋 COPY TO CLIPBOARD</button>
        <button class="btn btn-sec" onclick="downloadTxt()">💾 DOWNLOAD .TXT</button>
        <button class="btn btn-outline" onclick="buildNew()">↺ RESET ENGINE</button>
    </div>
    <div class="footer">v2.7.1 | Anti-Panic Protection | Testing Slice Enabled</div>
</div>

<script>
    // --- SYSTEM CONFIG ---
    const _CORE_REF = 'https://raw.githubusercontent.com/tonywilding33/Radio/main/Rugby_Hospital_Radio_Unique_Balanced.csv';
    const TEST_MODE = true; 

    let masterLibrary = [];
    let currentPlaylist = [];

    const AI_POOL = [
        { ID: "AI-101", Artist: "Queen", Title: "Radio Ga Ga" },
        { ID: "AI-102", Artist: "Ed Sheeran", Title: "Castle On The Hill" },
        { ID: "AI-103", Artist: "Adele", Title: "Rolling In The Deep" },
        { ID: "AI-104", Artist: "Coldplay", Title: "Fix You" },
        { ID: "AI-105", Artist: "Harry Styles", Title: "Watermelon Sugar" },
        { ID: "AI-106", Artist: "Dua Lipa", Title: "Don't Start Now" },
        { ID: "AI-107", Artist: "George Ezra", Title: "Budapest" },
        { ID: "AI-108", Artist: "The Beatles", Title: "Hey Jude" },
        { ID: "AI-109", Artist: "Oasis", Title: "Wonderwall" },
        { ID: "AI-110", Artist: "Eurythmics", Title: "Sweet Dreams" }
    ];

    window.onload = function() {
        document.getElementById('mode-text').innerText = TEST_MODE ? "ENGINE MODE: TESTING (100 SLICE)" : "ENGINE MODE: PRODUCTION (FULL)";
        const hBox = document.getElementById('start-hour');
        for(let i=0; i<24; i++) hBox.add(new Option(i.toString().padStart(2, '0') + ":00", i));
        const dBox = document.getElementById('duration');
        for(let i=1; i<=24; i++) dBox.add(new Option(i + (i===1 ? " Hour" : " Hours"), i * 60));
    };

    async function connectAndBuild() {
        try {
            const resp = await fetch(_CORE_REF);
            const csv = await resp.text();
            Papa.parse(csv, {
                header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: function(results) {
                    let filtered = results.data.filter(r => r.Artist && r.Title && String(r.Enabled).trim().toUpperCase() === 'Y');
                    masterLibrary = TEST_MODE ? filtered.slice(0, 100) : filtered;
                    runLogic();
                }
            });
        } catch (err) { alert("Data fetch failed. Check GitHub connection."); }
    }

    function runLogic() {
        const totalMinutes = parseInt(document.getElementById('duration').value);
        const startHour = parseInt(document.getElementById('start-hour').value);
        currentPlaylist = [];
        let history = []; 
        let elapsedSec = 0;

        while (elapsedSec < (totalMinutes * 60)) {
            let currentHour = (startHour + Math.floor(elapsedSec / 3600)) % 24;
            let dp = (currentHour >= 6 && currentHour < 12) ? "Morning" : 
                     (currentHour >= 12 && currentHour < 18) ? "Afternoon" : 
                     (currentHour >= 18 && currentHour < 24) ? "Evening" : "Night";

            // Rules Engine: strict=true (Production Gaps), strict=false (Emergency Gaps)
            const checkRules = (song, currentTime, strict = true) => {
                const lastSong = history.findLast(h => h.id === song.ID);
                const lastArtist = history.findLast(h => h.artist === song.Artist);
                
                const songGap = strict ? 15300 : 7200; // 4.25hr vs 2hr
                const artistGap = strict ? 6300 : 3600; // 1.75hr vs 1hr

                const separationPass = (!lastSong || (currentTime - lastSong.time > songGap)) && 
                                       (!lastArtist || (currentTime - lastArtist.time > artistGap));

                const dailyCount = history.filter(h => h.id === song.ID).length;
                const frequencyPass = dailyCount < 2;

                return separationPass && frequencyPass;
            };

            let pool = masterLibrary.filter(s => s.Daypart === dp && checkRules(s, elapsedSec));
            let pick;

            if (pool.length > 0) {
                pick = {...pool[Math.floor(Math.random() * pool.length)], type: 'DB'};
            } else {
                // Tier 2: AI Pool with strict rules
                let aiPool = AI_POOL.filter(s => checkRules(s, elapsedSec));
                if (aiPool.length > 0) {
                    pick = {...aiPool[Math.floor(Math.random() * aiPool.length)], type: 'AI'};
                } else {
                    // Tier 3: Relax rules for AI Pool (Emergency Recovery)
                    let recoveryPool = AI_POOL.filter(s => checkRules(s, elapsedSec, false));
                    
                    if (recoveryPool.length > 0) {
                        let recoveryPick = recoveryPool[Math.floor(Math.random() * recoveryPool.length)];
                        pick = {...recoveryPick, type: 'RECOVERY', Title: recoveryPick.Title + " (Recovery)"};
                    } else {
                        // Tier 4: Critical Failure - Pick song played longest ago from AI pool
                        let sortedByLastPlayed = [...AI_POOL].sort((a, b) => {
                            const lastA = history.findLast(h => h.id === a.ID)?.time || -1;
                            const lastB = history.findLast(h => h.id === b.ID)?.time || -1;
                            return lastA - lastB;
                        });
                        pick = {...sortedByLastPlayed[0], type: 'RECOVERY', Title: sortedByLastPlayed[0].Title + " (Critical)"};
                    }
                }
            }

            let displayMin = Math.floor((elapsedSec % 3600) / 60);
            pick.timeStr = currentHour.toString().padStart(2,'0') + ":" + displayMin.toString().padStart(2,'0');
            pick.currentDP = dp;
            
            currentPlaylist.push(pick);
            history.push({id: pick.ID, artist: pick.Artist, time: elapsedSec});
            elapsedSec += 240; 
        }
        render();
    }

    function render() {
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('monitor').style.display = 'block';
        document.getElementById('track-count').innerText = currentPlaylist.length + " TRACKS";
        document.getElementById('playlist-box').innerHTML = currentPlaylist.map((t, i) => `
            <div class="track-row ${t.type === 'AI' ? 'ai-fill' : (t.type === 'RECOVERY' ? 'recovery-fill' : '')}">
                <div class="track-info">
                    <div class="t-artist">${t.Artist}</div>
                    <div class="t-title">${t.Title}</div>
                    <span class="ai-label" style="color:${t.type === 'DB' ? '#aaa' : (t.type === 'AI' ? 'var(--ai-gold)' : 'var(--rhr-red)')}">
                        ${t.currentDP} • ${t.type === 'RECOVERY' ? 'EMERGENCY RECOVERY' : (t.type === 'AI' ? 'AI FALLBACK' : 'DATABASE')}
                    </span>
                </div>
                <div class="time-col">${t.timeStr}</div>
            </div>
        `).join('');
    }

    function copyToClipboard() {
        const txt = currentPlaylist.map(t => `${t.timeStr} | ${t.Artist} - ${t.Title}`).join('\n');
        navigator.clipboard.writeText(txt).then(() => alert("Copied to Clipboard!"));
    }

    function downloadTxt() {
        const txt = currentPlaylist.map(t => `${t.timeStr} | ${t.Artist} - ${t.Title}`).join('\n');
        const blob = new Blob([txt], { type: 'text/plain' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "RHR_Station_Log.txt";
        a.click();
    }

    function buildNew() {
        document.getElementById('monitor').style.display = 'none';
        document.getElementById('setup-view').style.display = 'block';
    }
</script>
</body>
</html>
