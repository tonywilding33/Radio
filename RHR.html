<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHR | Smart Logic Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --rhr-red: #e31e24; 
            --ai-gold: #b58900; 
            --ai-bg: #fffcf0; 
        }
        body { font-family: -apple-system, sans-serif; background: #f4f4f4; padding: 10px; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 500px; padding-top: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .header { text-align: center; margin-bottom: 20px; }
        .station-name { color: var(--rhr-red); font-size: 1.4rem; font-weight: 900; text-transform: uppercase; }
        label { display: block; font-weight: bold; margin: 10px 0 5px; font-size: 0.85rem; }
        select { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; -webkit-appearance: none; background: #fff; }
        .btn { width: 100%; border: none; padding: 16px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-bottom: 10px; }
        .btn-main { background: var(--rhr-red); color: #fff; }
        .btn-sec { background: #555; color: #fff; }
        .btn-outline { background: transparent; border: 1px solid #ddd; color: #777; }
        #playlist-box { border: 1px solid #eee; border-radius: 8px; max-height: 400px; overflow-y: auto; margin: 15px 0; }
        .track-row { display: flex; padding: 12px; border-bottom: 1px solid #f9f9f9; align-items: center; }
        .track-row.ai-fill { background-color: var(--ai-bg) !important; border-left: 4px solid var(--ai-gold); }
        .track-info { flex-grow: 1; }
        .t-artist { font-weight: bold; font-size: 0.95rem; }
        .t-title { color: #666; font-size: 0.85rem; }
        .time-col { font-weight: bold; color: var(--rhr-red); font-family: monospace; }
        .ai-label { font-size: 0.6rem; color: var(--ai-gold); font-weight: 800; display: block; }
        .footer { text-align: center; font-size: 0.65rem; color: #aaa; margin-top: 15px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="setup-view" class="card">
        <div class="header">
            <div class="station-name">Rugby Hospital Radio</div>
            <div style="font-size:0.7rem; color:#666; font-weight: bold;">STRICT SEPARATION MODE</div>
        </div>
        <label>Start Hour</label><select id="start-hour"></select>
        <label>Duration</label><select id="duration"></select>
        <button class="btn btn-main" onclick="connectAndBuild()">GENERATE LOG</button>
    </div>

    <div id="monitor" style="display:none;" class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:900; color:var(--rhr-red)">STATION LOG</span>
            <span id="track-count" style="font-size:0.7rem; font-weight:bold;"></span>
        </div>
        <div id="playlist-box"></div>
        <button class="btn btn-main" onclick="copyToClipboard()">📋 COPY TO CLIPBOARD</button>
        <button class="btn btn-sec" onclick="downloadTxt()">💾 DOWNLOAD .TXT</button>
        <button class="btn btn-outline" onclick="buildNew()">↺ BUILD NEW</button>
    </div>
    <div class="footer">v2.2 Cross-Platform | Anti-Repeat Active</div>
</div>

<script>
    const CSV_URL = 'https://raw.githubusercontent.com/tonywilding33/Radio/main/HR3328152B.csv';
    let masterLibrary = [];
    let currentPlaylist = [];

    const AI_POOL = [
        { ID: "AI-101", Artist: "Queen", Title: "Radio Ga Ga" },
        { ID: "AI-102", Artist: "Ed Sheeran", Title: "Castle On The Hill" },
        { ID: "AI-103", Artist: "Adele", Title: "Rolling In The Deep" },
        { ID: "AI-104", Artist: "Coldplay", Title: "Fix You" },
        { ID: "AI-105", Artist: "Harry Styles", Title: "Watermelon Sugar" },
        { ID: "AI-106", Artist: "Dua Lipa", Title: "Don't Start Now" },
        { ID: "AI-107", Artist: "George Ezra", Title: "Budapest" },
        { ID: "AI-108", Artist: "Elton John", Title: "I'm Still Standing" }
    ];

    window.onload = function() {
        const hBox = document.getElementById('start-hour');
        for(let i=0; i<24; i++) hBox.add(new Option(i.toString().padStart(2, '0') + ":00", i));
        const dBox = document.getElementById('duration');
        [1, 2, 3, 4, 6, 12].forEach(h => dBox.add(new Option(h + " Hours", h * 60)));
    };

    async function connectAndBuild() {
        try {
            const resp = await fetch(CSV_URL);
            const csv = await resp.text();
            Papa.parse(csv, {
                header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: function(results) {
                    const filtered = results.data.filter(r => r.Artist && r.Title && String(r.Enabled).trim().toUpperCase() === 'Y');
                    masterLibrary = filtered.slice(0, 100); // 100 song restriction
                    runLogic();
                }
            });
        } catch (err) { alert("Load Error."); }
    }

    async function runLogic() {
        const dur = parseInt(document.getElementById('duration').value);
        const start = parseInt(document.getElementById('start-hour').value);
        currentPlaylist = [];
        let history = [];
        let sec = 0;

        while (sec < (dur * 60)) {
            let hour = (start + Math.floor(sec / 3600)) % 24;
            let dp = (hour >= 6 && hour < 12) ? "Morning" : (hour >= 12 && hour < 18) ? "Afternoon" : "Evening";

            // CONSOLIDATED SEPARATION CHECK
            const checkRules = (song, currentTime) => {
                const lastSong = history.findLast(h => h.id === song.ID);
                const lastArtist = history.findLast(h => h.artist === song.Artist);
                
                // Song Sep: 4.25hr (15300s) | Artist Sep: 1.75hr (6300s)
                const songOk = !lastSong || (currentTime - lastSong.time > 15300);
                const artistOk = !lastArtist || (currentTime - lastArtist.time > 6300);
                
                return songOk && artistOk;
            };

            // Step 1: Filter DB
            let pool = masterLibrary.filter(s => s.Daypart === dp && checkRules(s, sec));

            let pick;
            if (pool.length > 0) {
                pick = {...pool[Math.floor(Math.random() * pool.length)], isAI: false};
            } else {
                // Step 2: Filter AI Pool with same strict rules
                let aiPool = AI_POOL.filter(s => checkRules(s, sec));
                if (aiPool.length > 0) {
                    pick = {...aiPool[Math.floor(Math.random() * aiPool.length)], isAI: true};
                } else {
                    // Step 3: Hard Fallback (Rules broken only as absolute last resort)
                    pick = {...AI_POOL[0], isAI: true, Title: AI_POOL[0].Title + " (RECOVERY)"};
                }
            }

            pick.timeStr = ((start + Math.floor(sec/3600))%24).toString().padStart(2,'0')+":"+(Math.floor((sec%3600)/60)).toString().padStart(2,'0');
            currentPlaylist.push(pick);
            history.push({id: pick.ID, artist: pick.Artist, time: sec});
            sec += 240; 
        }
        render();
    }

    function render() {
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('monitor').style.display = 'block';
        document.getElementById('track-count').innerText = currentPlaylist.length + " TRACKS";
        document.getElementById('playlist-box').innerHTML = currentPlaylist.map((t, i) => `
            <div class="track-row ${t.isAI ? 'ai-fill' : ''}">
                <div class="track-info">
                    <div class="t-artist">${t.Artist}</div>
                    <div class="t-title">${t.Title}</div>
                    ${t.isAI ? '<span class="ai-label">✨ ANTI-REPEAT ACTIVE</span>' : ''}
                </div>
                <div class="time-col">${t.timeStr}</div>
            </div>
        `).join('');
    }

    function copyToClipboard() {
        const txt = currentPlaylist.map(t => `${t.timeStr} | ${t.Artist} - ${t.Title}`).join('\n');
        navigator.clipboard.writeText(txt).then(() => alert("Copied to Clipboard!"));
    }

    function downloadTxt() {
        const txt = currentPlaylist.map(t => `${t.timeStr} | ${t.Artist} - ${t.Title}`).join('\n');
        const blob = new Blob([txt], { type: 'text/plain' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "RHR_Station_Log.txt";
        a.click();
    }

    function buildNew() {
        document.getElementById('monitor').style.display = 'none';
        document.getElementById('setup-view').style.display = 'block';
    }
</script>
</body>
</html>
