<script>
    // --- CONFIGURATION ---
    const _CORE_REF = 'https://raw.githubusercontent.com/tonywilding33/Radio/main/Rugby_Hospital_Radio_Unique_2500.csv';
    const TEST_MODE = true; // Set to FALSE for full 1,522 library; TRUE for 100-song testing.

    let masterLibrary = [];
    let currentPlaylist = [];

    // Permanent AI Fallback Pool
    const AI_POOL = [
        { ID: "AI-101", Artist: "Queen", Title: "Radio Ga Ga" },
        { ID: "AI-102", Artist: "Ed Sheeran", Title: "Castle On The Hill" },
        { ID: "AI-103", Artist: "Adele", Title: "Rolling In The Deep" },
        { ID: "AI-104", Artist: "Coldplay", Title: "Fix You" },
        { ID: "AI-105", Artist: "The Beatles", Title: "Hey Jude" },
        { ID: "AI-106", Artist: "Dua Lipa", Title: "Don't Start Now" },
        { ID: "AI-107", Artist: "George Ezra", Title: "Budapest" },
        { ID: "AI-108", Artist: "Oasis", Title: "Wonderwall" },
        { ID: "AI-109", Artist: "Eurythmics", Title: "Sweet Dreams" }
    ];

    async function connectAndBuild() {
        try {
            const resp = await fetch(_CORE_REF);
            const csv = await resp.text();
            Papa.parse(csv, {
                header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: function(results) {
                    let filtered = results.data.filter(r => 
                        r.Artist && r.Title && String(r.Enabled).trim().toUpperCase() === 'Y'
                    );

                    // APPLY TESTING SLICE
                    masterLibrary = TEST_MODE ? filtered.slice(0, 100) : filtered;
                    
                    console.log(`Library loaded. Mode: ${TEST_MODE ? 'TEST (100)' : 'PRO (FULL)'}`);
                    runLogic();
                }
            });
        } catch (err) { alert("Data fetch failed."); }
    }

    function runLogic() {
        const totalMinutes = parseInt(document.getElementById('duration').value);
        const startHour = parseInt(document.getElementById('start-hour').value);
        currentPlaylist = [];
        let history = []; // Tracks ID, Artist, and Time
        let elapsedSec = 0;

        while (elapsedSec < (totalMinutes * 60)) {
            let currentHour = (startHour + Math.floor(elapsedSec / 3600)) % 24;
            let dp = (currentHour >= 6 && currentHour < 12) ? "Morning" : 
                     (currentHour >= 12 && currentHour < 18) ? "Afternoon" : 
                     (currentHour >= 18 && currentHour < 24) ? "Evening" : "Night";

            const checkRules = (song, currentTime) => {
                // 1. Strict Separation Rules
                const lastSong = history.findLast(h => h.id === song.ID);
                const lastArtist = history.findLast(h => h.artist === song.Artist);
                
                const passesSeparation = (!lastSong || (currentTime - lastSong.time > 15300)) && 
                                         (!lastArtist || (currentTime - lastArtist.time > 6300));

                // 2. THE TWICE-A-DAY RULE:
                // Count how many times this specific Song ID appears in today's history
                const dailyCount = history.filter(h => h.id === song.ID).length;
                const passesDailyLimit = dailyCount < 2;

                return passesSeparation && passesDailyLimit;
            };

            // Attempt Database Pick
            let pool = masterLibrary.filter(s => s.Daypart === dp && checkRules(s, elapsedSec));
            let pick;

            if (pool.length > 0) {
                pick = {...pool[Math.floor(Math.random() * pool.length)], type: 'DB'};
            } else {
                // Trigger AI Filter if DB fails or song limit is hit
                let aiPool = AI_POOL.filter(s => checkRules(s, elapsedSec));
                if (aiPool.length > 0) {
                    pick = {...aiPool[Math.floor(Math.random() * aiPool.length)], type: 'AI'};
                } else {
                    // Emergency recovery pick
                    const lastTrack = history.length > 0 ? history[history.length - 1] : null;
                    let recoveryPick = AI_POOL.find(s => !lastTrack || s.ID !== lastTrack.id);
                    pick = {...recoveryPick, type: 'RECOVERY'};
                }
            }

            // [Formatting and rendering logic...]
            currentPlaylist.push(pick);
            history.push({id: pick.ID, artist: pick.Artist, time: elapsedSec});
            elapsedSec += 240; 
        }
        render();
    }
</script>
