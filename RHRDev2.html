<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RHR Music Scheduler</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #00ff9d; --text: #e0e0e0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .status-pill { padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .online { background: #1b4d3e; color: var(--accent); }
        .offline { background: #4d1b1b; color: #ff5555; }
        
        .input-grid { display: grid; grid-template-columns: 2fr 2fr 1fr auto; gap: 10px; background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #333; }
        input { background: #2d2d2d; border: 1px solid #444; color: white; padding: 12px; border-radius: 6px; font-size: 1rem; }
        button { background: var(--accent); color: #121212; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:hover { background: #00cc7e; }

        .schedule-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th { background: #2d2d2d; text-align: left; padding: 15px; font-size: 0.8rem; color: #888; }
        td { padding: 15px; border-top: 1px solid #333; }
        .copy-btn { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 5px 10px; font-size: 0.7rem; }
        .copy-btn:hover { background: var(--accent); color: #121212; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0;">Music Scheduler</h1>
            <p style="color:#888; margin:5px 0;">Radio Hospital Rotherham</p>
        </div>
        <div id="status" class="status-pill offline">Connecting...</div>
    </header>

    <div class="input-grid">
        <input type="text" id="artist" placeholder="Artist (e.g. Oasis)" autofocus>
        <input type="text" id="title" placeholder="Song Title">
        <input type="time" id="schedTime">
        <button onclick="addToSchedule()">ADD TO LOG</button>
    </div>

    <table class="schedule-table">
        <thead>
            <tr>
                <th>TIME</th>
                <th>ARTIST</th>
                <th>TITLE</th>
                <th>ACTION</th>
            </tr>
        </thead>
        <tbody id="schedule-body">
            <!-- Data from Google Sheets will load here -->
        </tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuqGGbU60k0xUchgmWuhe7_krlnAJlOTZCYPGLdwR3aI4d8xdmbX1R3ZOncVPAHCLIQg/exec";
    const ENTRY_ARTIST = "entry.1096403488";
    const ENTRY_TITLE = "entry.1682859365";

    // Initialize time input to current time
    document.getElementById('schedTime').value = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});

    async function refreshHistory() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            const body = document.getElementById('schedule-body');
            const status = document.getElementById('status');

            if (data.error) throw new Error(data.error);

            status.innerText = "Cloud Sync Active";
            status.className = "status-pill online";

            body.innerHTML = '';
            data.reverse().slice(0, 15).forEach(item => {
                const row = body.insertRow();
                row.innerHTML = `
                    <td style="color:#888">${item.scheduledTime || '---'}</td>
                    <td style="font-weight:bold">${item.artist}</td>
                    <td>${item.title}</td>
                    <td><button class="copy-btn" onclick="copyRow('${item.artist} - ${item.title}')">COPY</button></td>
                `;
            });
        } catch (err) {
            document.getElementById('status').innerText = "Offline Mode";
            document.getElementById('status').className = "status-pill offline";
        }
    }

    function addToSchedule() {
        const artist = document.getElementById('artist').value;
        const title = document.getElementById('title').value;
        const time = document.getElementById('schedTime').value;

        if (!artist || !title) return alert("Missing info");

        // Send to Google Sheet
        const formUrl = `https://docs.google.com/forms/d/e/1m2y8vi3FOcOOBIuycfv-QWoqUnAGbLNgKEDhyXPMsog/formResponse?${ENTRY_ARTIST}=${encodeURIComponent(artist)}&${ENTRY_TITLE}=${encodeURIComponent(title)}&submit=Submit`;
        
        fetch(formUrl, { mode: 'no-cors' });

        // UI Reset
        document.getElementById('artist').value = '';
        document.getElementById('title').value = '';
        document.getElementById('artist').focus();

        // Refresh list after 2 seconds to allow Google to process
        setTimeout(refreshHistory, 2000);
    }

    function copyRow(text) {
        navigator.clipboard.writeText(text);
        // Visual feedback
        event.target.innerText = "COPIED!";
        setTimeout(() => event.target.innerText = "COPY", 1000);
    }

    // Initial load
    refreshHistory();
    // Auto-refresh every 30 seconds
    setInterval(refreshHistory, 30000);
</script>

</body>
</html>
