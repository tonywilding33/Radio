<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RHR | Virtual Producer v2.18 (Local)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --rhr-red: #e31e24; --rhr-pink-fill: #fde2e2; --rhr-dark: #2c3e50; }
        body { font-family: -apple-system, sans-serif; background: #f4f4f4; padding: 10px; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 500px; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); border-top: 6px solid var(--rhr-red); }
        .logo { font-size: 3rem; font-weight: 900; color: var(--rhr-red); text-align: center; margin: 0; line-height: 1; }
        .station-name { color: var(--rhr-dark); font-size: 1rem; font-weight: bold; text-transform: uppercase; text-align: center; margin-bottom: 20px; letter-spacing: 1px;}
        label { display: block; font-weight: bold; margin: 10px 0 5px; font-size: 0.85rem; }
        select, .btn { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .btn-main { background: var(--rhr-red); color: #fff; font-weight: bold; cursor: pointer; border: none; }
        #playlist-box { border: 1px solid #eee; border-radius: 8px; max-height: 400px; overflow-y: auto; margin: 15px 0; }
        .track-row { display: flex; padding: 12px; border-bottom: 1px solid #eee; font-size: 0.85rem; justify-content: space-between; align-items: center; }
        .track-row:nth-of-type(even) { background-color: var(--rhr-pink-fill); }
        .t-artist { font-weight: bold; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="card">
        <p class="logo">RHR</p>
        <div class="station-name">Rugby Hospital Radio</div>
        <div id="setup-view">
            <label>Start Hour</label>
            <select id="start-hour"></select>
            <label>Duration</label>
            <select id="shift-duration"></select>
            <button class="btn btn-main" onclick="loadLibrary()">GENERATE PLAYLIST</button>
        </div>
        <div id="monitor" style="display:none;">
            <div id="playlist-box"></div>
            <button class="btn btn-main" style="background:#444" onclick="location.reload()">↺ NEW SESSION</button>
        </div>
    </div>
</div>
<script>
    const _MASTER_REF = 'https://raw.githubusercontent.com/tonywilding33/Radio/main/rhr_master.csv';
    let masterLibrary = [];

    window.onload = function() {
        const hBox = document.getElementById('start-hour');
        for(let i=0; i<24; i++) hBox.add(new Option(i.toString().padStart(2, '0') + ":00", i));
        const dBox = document.getElementById('shift-duration');
        for(let i=1; i<=12; i++) dBox.add(new Option(i + " Hours", i));
    };

    async function loadLibrary() {
        try {
            const resp = await fetch(_MASTER_REF);
            const csv = await resp.text();
            Papa.parse(csv, {
                header: true, skipEmptyLines: true,
                complete: (results) => {
                    masterLibrary = results.data.filter(r => String(r.Enabled || '').trim().toUpperCase() === 'Y');
                    generatePlaylist();
                }
            });
        } catch (err) { alert("Error loading CSV from GitHub."); }
    }

    function generatePlaylist() {
        const startHour = parseInt(document.getElementById('start-hour').value);
        const duration = parseInt(document.getElementById('shift-duration').value);
        let playlist = [];
        let history = []; 

        for (let h = 0; h < duration; h++) {
            let curHour = (startHour + h) % 24;
            let elapsed = 0;
            while (elapsed < 3600) {
                let picks = masterLibrary.filter(s => {
                    const match = history.findLast(hi => hi.Title === s.Title && hi.Artist === s.Artist);
                    if (match) {
                        const diff = Date.now() - match.time;
                        if (diff < 15300000) return false; 
                    }
                    return true;
                });
                let p = picks.length > 0 ? picks[Math.floor(Math.random() * picks.length)] : masterLibrary[Math.floor(Math.random() * masterLibrary.length)];
                let time = curHour.toString().padStart(2,'0') + ":" + Math.floor(elapsed/60).toString().padStart(2,'0');
                playlist.push({...p, timeStr: time});
                history.push({...p, time: Date.now()});
                elapsed += 240; 
            }
        }
        render(playlist);
    }

    function render(list) {
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('monitor').style.display = 'block';
        document.getElementById('playlist-box').innerHTML = list.map(t => `
            <div class="track-row">
                <span><span class="t-artist">${t.Artist}</span> - ${t.Title}</span>
                <span style="font-family:monospace"><b>${t.timeStr}</b></span>
            </div>
        `).join('');
    }
</script>
</body>
</html>
