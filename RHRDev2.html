<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RHR Music Log Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #2d2d2d; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #00ff9d; margin-top: 0; }
        .status-bar { text-align: center; font-size: 0.8em; margin-bottom: 20px; padding: 5px; border-radius: 4px; }
        .online { background: #1b4d3e; color: #00ff9d; }
        .offline { background: #4d1b1b; color: #ff5555; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #444; border-radius: 6px; background: #3d3d3d; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00ff9d; border: none; border-radius: 6px; color: #1a1a1a; font-weight: bold; cursor: pointer; font-size: 1em; }
        button:hover { background: #00cc7e; }
        #history { margin-top: 30px; border-top: 1px solid #444; padding-top: 20px; }
        .log-entry { background: #383838; padding: 10px; border-radius: 4px; margin-bottom: 10px; font-size: 0.9em; border-left: 4px solid #00ff9d; }
        .timestamp { color: #888; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <h2>RHR Music Log</h2>
    <div id="status" class="status-bar offline">CONNECTING TO CLOUD...</div>

    <label>Artist Name</label>
    <input type="text" id="artist" placeholder="e.g. Arctic Monkeys" autofocus>

    <label>Song Title</label>
    <input type="text" id="title" placeholder="e.g. Do I Wanna Know?">

    <button onclick="generateAndLog()">GENERATE & LOG TO SHEET</button>

    <div id="history">
        <h3 style="color: #00ff9d;">Recent History</h3>
        <div id="log-list">Loading history...</div>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuqGGbU60k0xUchgmWuhe7_krlnAJlOTZCYPGLdwR3aI4d8xdmbX1R3ZOncVPAHCLIQg/exec";
    
    // Using your Spreadsheet/Form IDs
    const FORM_ID = "124eG6jdpcSuW8t3yizpoHliFcdgtfEQhiCltGSS7x2w"; 
    const ENTRY_ARTIST = "entry.1096403488"; // Standard first field
    const ENTRY_TITLE = "entry.1682859365";  // Standard second field
    // ---------------------

    // 1. FETCH HISTORY FROM GOOGLE SHEET
    async function fetchHistory() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            const logList = document.getElementById('log-list');
            const statusDiv = document.getElementById('status');
            
            if (data.error) throw new Error(data.error);

            statusDiv.innerText = "CLOUD SYNC ACTIVE";
            statusDiv.className = "status-bar online";

            logList.innerHTML = '';
            // Show last 5 entries
            data.reverse().slice(0, 5).forEach(item => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.innerHTML = `<strong>${item.artist}</strong> - ${item.title}<br>
                                 <span class="timestamp">${new Date(item.timestamp).toLocaleTimeString()}</span>`;
                logList.appendChild(div);
            });
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerText = "OFFLINE MODE (History Unavailable)";
            document.getElementById('status').className = "status-bar offline";
            document.getElementById('log-list').innerHTML = "Unable to load cloud history.";
        }
    }

    // 2. LOG NEW ENTRY TO GOOGLE SHEET
    function generateAndLog() {
        const artist = document.getElementById('artist').value;
        const title = document.getElementById('title').value;

        if (!artist || !title) {
            alert("Please fill in both Artist and Title.");
            return;
        }

        // Construct the Google Form Submission URL
        const formUrl = `https://docs.google.com/forms/d/e/1m2y8vi3FOcOOBIuycfv-QWoqUnAGbLNgKEDhyXPMsog/formResponse?${ENTRY_ARTIST}=${encodeURIComponent(artist)}&${ENTRY_TITLE}=${encodeURIComponent(title)}&submit=Submit`;

        // Send data silently in background
        fetch(formUrl, { mode: 'no-cors' });

        // Instant local feedback
        alert(`Logged: ${artist} - ${title}`);
        
        // Clear inputs and refresh history after a short delay
        document.getElementById('artist').value = '';
        document.getElementById('title').value = '';
        document.getElementById('artist').focus();
        
        setTimeout(fetchHistory, 2000);
    }

    // Load history on startup
    fetchHistory();
</script>

</body>
</html>
