<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony Wilding">
    <title>Hospital Radio | Playlist Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --success: #10b981; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); 
            display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
            -webkit-user-select: none; user-select: none; /* Prevents text highlights */
        }
        .wrapper { width: 100%; max-width: 550px; padding: 20px; }
        .setup-card { background: var(--card); padding: 30px; border-radius: 16px; border: 1px solid #334155; }
        h1 { font-size: 1.6rem; margin-bottom: 25px; text-align: center; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; margin-bottom: 6px; }
        select { width: 100%; background: #0f172a; color: white; border: 1px solid #475569; padding: 12px; border-radius: 8px; }
        .btn-start { width: 100%; background: var(--accent); color: #0f172a; border: none; padding: 16px; border-radius: 8px; font-weight: 800; cursor: pointer; }
        #monitor { display: none; background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #334155; }
        .playlist-container { max-height: 500px; overflow-y: auto; margin: 15px 0; border-top: 1px solid #334155; border-bottom: 1px solid #334155; }
        .track-row { padding: 10px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 10px; }
        .t-artist { color: var(--accent); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .t-title { font-size: 1rem; font-weight: 600; color: #fff; }
        .btn-download { width: 100%; background: var(--success); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .credit-footer { text-align: center; color: #f8fafc; font-size: 0.65rem; margin-top: 25px; text-transform: uppercase; opacity: 0.9; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="wrapper">
    <div id="setup-view" class="setup-card">
        <h1>SHOW TIME</h1>
        <div class="field"><label>Start Hour</label><select id="start-hour"></select></div>
        <div class="field"><label>Broadcast Duration</label><select id="duration"></select></div>
        <button class="btn-start" onclick="ui.start()">GENERATE PLAYLIST</button>
        <div class="credit-footer">Developed by Tony Wilding</div>
    </div>

    <div id="monitor">
        <div id="playlist-box" class="playlist-container"></div>
        <button class="btn-download" onclick="ui.save()">Download Playlist (txt)</button>
        <button class="btn-start" style="background:#475569; color:white;" onclick="ui.reset()">← BACK</button>
    </div>
</div>

<script>
/** 
 * PROTECTED LOGIC 
 * The logic is encapsulated in a constant 'ui' to prevent global variable prying.
 */
const ui = (function() {
    const _c = 'aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL3Rvbnl3aWxkaW5nMzMvUmFkaW8vbWFpbi9IUjMzMjgxNTJCLmNzdg==';
    let lib = [], pl = [];

    // Keyboard Lock
    document.onkeydown = (e) => {
        if([123, 85, 73, 74, 67].includes(e.keyCode) && (e.ctrlKey || e.shiftKey || e.keyCode == 123)) return false;
    };

    return {
        start: async function() {
            try {
                const r = await fetch(atob(_c));
                const t = await r.text();
                Papa.parse(t, {
                    header: true, skipEmptyLines: true,
                    complete: (res) => {
                        lib = res.data.filter(s => s.Artist && s.Title && String(s.Enabled).toUpperCase() === 'Y');
                        this.build();
                    }
                });
            } catch(e) { alert("Access Denied."); }
        },
        build: function() {
            const dur = parseInt(document.getElementById('duration').value);
            const start = parseInt(document.getElementById('start-hour').value);
            pl = []; let sec = 0, h = start;
            
            while(sec < (dur * 60)) {
                let dp = (h>=6 && h<12)?"MORNING":(h>=12 && h<18)?"AFTERNOON":(h>=18 && h<22)?"EVENING":"NIGHT";
                let pool = lib.filter(s => String(s.Daypart).toUpperCase() === dp);
                if(!pool.length) pool = lib;
                let pick = pool[Math.floor(Math.random()*pool.length)];
                
                let d = new Date(); d.setHours(start, 0, sec, 0);
                let ts = d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0');
                
                pl.push({...pick, time: ts});
                sec += 235; h = (start + Math.floor(sec/3600)) % 24;
            }
            this.render();
        },
        render: function() {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('monitor').style.display = 'block';
            document.getElementById('playlist-box').innerHTML = pl.map(t => `
                <div class="track-row">
                    <div style="flex:1"><div class="t-artist">${t.Artist}</div><div class="t-title">${t.Title}</div></div>
                    <div style="font-family:monospace">${t.time}</div>
                </div>`).join('');
        },
        save: function() {
            let out = pl.map(t => `${t.time} | ${t.Artist} - ${t.Title}`).join('\n');
            const b = new Blob([out], {type:'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = 'Playlist.txt'; a.click();
        },
        reset: () => location.reload()
    };
})();

// Initialize Duration Dropdown
(function() {
    const h = document.getElementById('start-hour'), d = document.getElementById('duration');
    for(let i=0; i<24; i++) h.add(new Option(i.toString().padStart(2,'0')+":00", i));
    for(let i=1; i<=24; i++) d.add(new Option(i + " Hour Playlist", i * 60));
})();
</script>
</body>
</html>
